<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>shusantv — 国会中継グリッド</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --glass: rgba(18, 18, 22, .55);
    --glass-border: rgba(255, 255, 255, .08);
    --accent: #5fe0b7;
    --tally: #ff3b30;
    --shu: #5b9bd5;
    --san: #d57aa5;
  }
  body { margin: 0; background: #050507; color: #eee;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, sans-serif; }

  /* ガラスのヘッダーバー */
  header { display: flex; align-items: center; gap: 14px; padding: 8px 16px; flex-wrap: wrap;
    background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--glass-border); }
  header h1 { font-size: 14px; margin: 0; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
  header h1::before { content: "●"; color: var(--tally); font-size: 9px; vertical-align: 2px; margin-right: 7px;
    animation: pulse 2.4s ease-in-out infinite; }
  header .status { color: #9a9aa2; font-size: 11px; letter-spacing: .02em; }
  header .credit { margin-left: auto; }
  header .credit a { color: #7da7c7; text-decoration: none; }
  header .credit a:hover { text-decoration: underline; }
  #watch { width: 300px; background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); color: #eee;
    border-radius: 999px; padding: 4px 12px; font-size: 12px; outline: none; transition: border-color .2s; }
  #watch:focus { border-color: var(--accent); }
  label.auto { font-size: 11px; color: #9a9aa2; user-select: none; display: flex; align-items: center; gap: 4px; }
  label.auto input { accent-color: var(--accent); }

  /* 視聴時刻の予約 (方針①: 手動の時刻予約アラーム) */
  #resvBtn { font-size: 11px; color: #9a9aa2; background: rgba(255,255,255,.06);
    border: 1px solid var(--glass-border); border-radius: 999px; padding: 4px 12px; cursor: pointer; transition: border-color .2s, color .2s; }
  #resvBtn:hover { border-color: var(--accent); color: #eee; }
  #resvBtn.has::after { content: ""; display: inline-block; width: 6px; height: 6px; margin-left: 6px;
    border-radius: 50%; background: var(--accent); vertical-align: 1px; box-shadow: 0 0 6px var(--accent); }
  #resvPanel { position: fixed; top: 50px; right: 16px; z-index: 9; width: 320px; display: none;
    background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  #resvPanel.open { display: block; }
  #resvPanel h2 { font-size: 12px; margin: 0 0 10px; font-weight: 800; letter-spacing: .1em; color: #c9c9cf; }
  #resvPanel select, #resvPanel input[type=time] { width: 100%; box-sizing: border-box; margin-bottom: 6px;
    background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); color: #eee; border-radius: 8px;
    padding: 6px 8px; font-size: 12px; outline: none; }
  #resvPanel select:focus, #resvPanel input[type=time]:focus { border-color: var(--accent); }
  #resvPanel .row { display: flex; gap: 6px; }
  #resvPanel button.mini { flex: 1; font-size: 11px; color: #9a9aa2; background: rgba(255,255,255,.06);
    border: 1px solid var(--glass-border); border-radius: 8px; padding: 5px 0; cursor: pointer; }
  #resvPanel button.mini:hover { border-color: var(--accent); color: #eee; }
  #resvAdd { width: 100%; margin-top: 8px; font-size: 12px; font-weight: 700; color: #052; background: var(--accent);
    border: none; border-radius: 8px; padding: 8px 0; cursor: pointer; }
  #resvAdd:disabled { opacity: .4; cursor: not-allowed; }
  #resvList { list-style: none; margin: 12px 0 0; padding: 0; max-height: 240px; overflow-y: auto; }
  #resvList:empty::before { content: "予約はありません"; color: #6a6a72; font-size: 11px; }
  #resvList li { display: flex; align-items: center; gap: 8px; padding: 7px 0; font-size: 12px;
    border-top: 1px solid var(--glass-border); }
  #resvList li.fired { opacity: .45; }
  #resvList li .meta { flex: 1; min-width: 0; display: flex; gap: 6px; align-items: baseline; }
  #resvList li .meta .t { font-weight: 800; color: var(--accent); flex-shrink: 0; }
  #resvList li.fired .meta .t { color: #9a9aa2; }
  #resvList li .meta .nm { color: #c9c9cf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #resvList li .cd { font-size: 10px; color: #8a8a92; flex-shrink: 0; }
  #resvList li .del { cursor: pointer; color: #6a6a72; flex-shrink: 0; }
  #resvList li .del:hover { color: var(--tally); }

  /* 予約発動時のタイル強調(ミントのパルス) */
  .tile.resv { outline: 3px solid var(--accent); outline-offset: -3px;
    box-shadow: 0 0 30px rgba(95,224,183,.5); animation: pulse 1s ease-in-out 6; }

  /* トースト(OS通知が無効でも画面内でフィードバック) */
  #toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: rgba(10,10,14,.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--accent); color: #eee; padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 700; z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity .3s, transform .3s; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #grid { display: grid; gap: 8px; padding: 8px; height: calc(100vh - 49px); box-sizing: border-box; }

  /* タイル: 枠は消し、わずかな境界線と影 */
  .tile { position: relative; background: #000; border-radius: 10px; overflow: hidden; cursor: pointer;
    min-height: 0; min-width: 0; container-type: size;
    outline: 1px solid var(--glass-border); outline-offset: -1px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    transition: outline-color .25s, box-shadow .25s, filter .25s; }
  .tile:hover { filter: brightness(1.06); }
  .tile.unmuted { outline: 2px solid var(--accent); outline-offset: -2px;
    box-shadow: 0 4px 28px rgba(95,224,183,.18); }
  .tile.hit { outline: 2px solid var(--tally); outline-offset: -2px;
    box-shadow: 0 0 26px rgba(255,59,48,.35); }
  .tile video { width: 100%; height: 100%; display: block; background: #000; object-fit: cover; }

  /* タリーランプ (ウォッチヒット時) */
  .tally { position: absolute; top: 8px; right: 8px; z-index: 2; display: none; align-items: center; gap: 6px;
    background: rgba(0,0,0,.55); backdrop-filter: blur(8px); border: 1px solid rgba(255,59,48,.5);
    color: #ff6b62; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 800; letter-spacing: .12em; }
  .tally::before { content: "●"; color: var(--tally); font-size: 9px; animation: pulse 1.1s ease-in-out infinite; }
  .tile.hit .tally { display: flex; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }

  /* 音声出力中バッジ (フォーカスタイル)。タリーと同意匠のミント版 */
  .pgm { position: absolute; top: 8px; left: 8px; z-index: 2; display: none; align-items: center; gap: 6px;
    background: rgba(0,0,0,.55); backdrop-filter: blur(8px); border: 1px solid rgba(95,224,183,.5);
    color: var(--accent); border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 800; letter-spacing: .12em; }
  .tile.unmuted .pgm { display: flex; }

  /* 下部ラベル: ガラス帯 + 院カラードット */
  .tile .label { position: absolute; left: 0; right: 0; bottom: 0; padding: 7px 12px;
    font-size: 14px; font-weight: 600; letter-spacing: .02em;
    background: linear-gradient(transparent, rgba(5,5,7,.72) 38%);
    backdrop-filter: blur(2px);
    display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 11px; font-weight: 800; flex-shrink: 0; display: flex; align-items: center; gap: 5px;
    color: #c9c9cf; }
  .badge::before { content: "●"; font-size: 8px; }
  .badge.shugiin::before { color: var(--shu); }
  .badge.sangiin::before { color: var(--san); }
  .muteicon { margin-left: auto; opacity: .65; font-size: 12px; }
  .quality { font-size: 9px; font-weight: 800; color: #8fce6a; border: 1px solid rgba(143,206,106,.55);
    border-radius: 3px; padding: 0 4px; flex-shrink: 0; letter-spacing: .06em; }
  .quality:empty { display: none; }

  /* サムネ(フォーカス時プレビュー)のラベルは短縮名だけに絞り、院は文字色で示す */
  .name .nshort { display: none; }
  #grid.focusmode .tile:not(.unmuted) :is(.nfull, .badge, .quality, .muteicon) { display: none; }
  #grid.focusmode .tile:not(.unmuted) .nshort { display: inline; }
  .tile.shugiin .nshort { color: var(--shu); }
  .tile.sangiin .nshort { color: var(--san); }

  /* 字幕バブル: ガラス */
  .asr { position: absolute; left: 6%; right: 6%; bottom: 11%; pointer-events: none;
    display: flex; justify-content: center; }
  .asr:empty { display: none; }
  .asr .bubble { background: rgba(10, 10, 14, .58); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); border-radius: .6em; padding: .3em .65em;
    font-size: max(3.4cqw, 14px); line-height: 1.35; font-weight: 600; color: #ffeebe;
    width: 88%; box-sizing: border-box;
    text-align: left; white-space: pre-line; word-break: auto-phrase;
    max-height: calc(1.35em * 3 + .6em - 4px); overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end; }
  .asr .bubble .old { color: #a9a9a2; }
  /* プレビューの字幕は広いタイルでだけ5行に拡大し、極小タイルでは映像が食われるので出さない */
  @container (min-width: 380px) {
    #grid.focusmode .tile:not(.unmuted) .bubble {
      font-size: max(4cqw, 14px);
      max-height: calc(1.35em * 5 + .6em - 4px);
    }
  }
  /* 極小プレビューでも字幕は消さない。最新1行だけの細帯にして映像を残す */
  @container (max-width: 239px) {
    #grid.focusmode .tile:not(.unmuted) .asr { left: 2%; right: 2%; bottom: 34px; }
    #grid.focusmode .tile:not(.unmuted) .bubble {
      width: 100%;
      padding: .15em .45em;
      max-height: calc(1.35em + .3em);
    }
  }
  .pending video { opacity: .3; }
  .empty { padding: 48px; color: #6a6a72; text-align: center; letter-spacing: .1em; }

  /* 開始ゲート */
  #gate { position: fixed; inset: 0; background: rgba(5,5,7,.6); backdrop-filter: blur(18px);
    display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; }
  #gate::before { content: "SHUSANTV"; font-size: 13px; font-weight: 800; letter-spacing: .3em; color: #9a9aa2; }
  #gate::after { content: "クリックで字幕には音声認識を使用します(初回はモデルをダウンロード)";
    font-size: 11px; color: #6a6a72; }
</style>
</head>
<body>
<header>
  <h1>shusantv</h1>
  <span class="status" id="status">読み込み中…</span>
  <input id="watch" placeholder="ウォッチ: 議員名,会派をカンマ区切り">
  <label class="auto"><input type="checkbox" id="autoFocus" checked> ヒットで自動フォーカス</label>
  <button id="resvBtn" type="button">⏰ 予約</button>
  <span class="status"><a href="transcript.html" style="color:#7da7c7;text-decoration:none">📝 文字起こし(参)</a></span>
  <span class="status credit">映像:
    <a href="https://www.shugiintv.go.jp/jp/" target="_blank" rel="noopener">衆議院インターネット審議中継</a> /
    <a href="https://www.webtv.sangiin.go.jp/webtv/" target="_blank" rel="noopener">参議院インターネット審議中継</a>
    （著作権は各議院に帰属。本サイトは非公式の個人用ビューアです）</span>
</header>
<div id="resvPanel">
  <h2>視聴時刻を予約</h2>
  <select id="resvMeeting"></select>
  <input type="time" id="resvTime">
  <div class="row">
    <button type="button" class="mini" data-min="15">+15分</button>
    <button type="button" class="mini" data-min="30">+30分</button>
    <button type="button" class="mini" data-min="60">+60分</button>
  </div>
  <button type="button" id="resvAdd">この時刻に視聴開始を予約</button>
  <ul id="resvList"></ul>
</div>
<div id="toast"></div>
<div id="grid"></div>
<div id="gate">クリックで開始（音声・発言認識の有効化）</div>
<script type="module">
// BudouX: 文節相当の区切りで字幕バブルを組む(Google製・Chrome の word-break:auto-phrase と同等)
import { loadDefaultJapaneseParser } from "https://cdn.jsdelivr.net/npm/budoux@0.6.2/+esm";
window.budouxParser = loadDefaultJapaneseParser();
</script>
<script>
const grid = document.getElementById("grid");
const statusEl = document.getElementById("status");
const tiles = new Map();
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ---- 音声基盤 ----
// Chromeでは muted な video の音声キャプチャが無音になる既知バグがあるため、
// video自体は常にunmuteし、WebAudioで「認識用(フル音声)」と「スピーカー(GainNode)」に分岐する。
// AudioContextはユーザー操作後でないと動かないので初回クリックのゲートを置く。
let actx = null;
document.getElementById("gate").addEventListener("click", async function () {
  actx = new AudioContext();
  this.remove();
  // オンデバイス認識のja-JP利用権はオリジン単位。未取得ならこのオリジン用にinstallしてから始める
  if (SR?.available) {
    try {
      let a = await SR.available({ langs: ["ja-JP"], processLocally: true });
      if (a === "downloadable") {
        statusEl.textContent = "音声認識の日本語パックを準備中…";
        await SR.install({ langs: ["ja-JP"], processLocally: true });
        a = await SR.available({ langs: ["ja-JP"], processLocally: true });
      }
      if (a !== "available") statusEl.textContent = `⚠ オンデバイス音声認識が使えません (${a})`;
    } catch (e) { statusEl.textContent = `⚠ ASR初期化: ${e}`; }
  }
  for (const t of tiles.values()) initAudio(t);
});

function initAudio(t) {
  if (!actx || t.audio) return;
  t.video.muted = false;
  const src = actx.createMediaElementSource(t.video);
  const gain = actx.createGain();
  gain.gain.value = 0;
  src.connect(gain).connect(actx.destination);
  t.audio = { src, gain };
  if (SR) startAsr(t); // 衆参とも同じASR字幕(参院公式字幕は検出用に裏で併用)
}

// ---- 衆議院: ブラウザ内蔵オンデバイス音声認識 ----
// 注意: SODA(SpeechRecognition.install)導入直後はChrome完全再起動が必要。
// 未ロードだと "network" エラーで即終了する(Chrome 149時点の誤報告, crbug 520350511)
function startAsr(t) {
  const dest = actx.createMediaStreamDestination();
  t.audio.src.connect(dest);
  const rec = new SR();
  rec.lang = "ja-JP";
  rec.continuous = true;
  rec.interimResults = true;
  rec.processLocally = true;
  applyPhrases(rec); // コンテキストバイアシング(ウォッチ語を優先語彙に)
  const asrEl = t.el.querySelector(".asr");
  let errors = 0;
  let brightBase = 0; // この文字位置までは「古い」= グレー表示
  let marks = [];     // [文字位置, 時刻] 新しい文字の出現記録(時間フェード用)
  const FADE = 500, TS = "\u2009";
  const IDLE_HIDE = 30_000; // 新しい発言が来なければ字幕を消す(散会後に残さない)
  let lastGrowth = 0;

  // 直近FADE ms以内に出た文字だけ明色、それ以前はグレー。改行なし(自然折り返しのみ)
  let lastFull = "";
  function render() {
    const now = performance.now();
    if (lastGrowth && now - lastGrowth > IDLE_HIDE) { asrEl.innerHTML = ""; return; }
    for (const [len, tm] of marks) if (now - tm > FADE) brightBase = Math.max(brightBase, len);
    marks = marks.filter(([, tm]) => now - tm <= FADE);
    const text = lastFull.slice(-150); // 表示は末尾のみ(3行高でクリップされる)
    asrEl.innerHTML = "";
    if (!text) return;
    const b = document.createElement("div");
    b.className = "bubble";
    const inner = document.createElement("div"); // flex(下端寄せ)の単一子要素
    const phrases = window.budouxParser ? window.budouxParser.parse(text) : [text];
    const oldParts = [], newParts = [];
    let pos = lastFull.length - text.length;
    for (const ph of phrases) {
      (pos + ph.length <= brightBase ? oldParts : newParts).push(ph);
      pos += ph.length;
    }
    if (oldParts.length) {
      const sp = document.createElement("span");
      sp.className = "old";
      sp.textContent = oldParts.join(TS) + (newParts.length ? TS : "");
      inner.appendChild(sp);
    }
    if (newParts.length) {
      const sp = document.createElement("span");
      sp.textContent = newParts.join(TS);
      inner.appendChild(sp);
    }
    b.appendChild(inner);
    asrEl.appendChild(b);
  }
  t.capTimer = setInterval(render, 200); // 結果が来なくてもフェードを進める
  // ポーズ(isFinal)ごとに句読点を補う: 文末形なら「。」、続きそうなら「、」
  const punct = (s) =>
    !s || /[。、．，！？!?]$/.test(s) ? s
    : /(です|ます|でした|ました|ません|ございます|であります)(ね|よ)?$/.test(s) ? s + "。"
    : s + "、";
  rec.onresult = (e) => {
    let full = "";
    for (const r of e.results) full += r.isFinal ? punct(r[0].transcript) : r[0].transcript;
    if (full.length < lastFull.length) { brightBase = 0; marks = []; } // セッション再開でリセット
    if (full.length > lastFull.length) { marks.push([lastFull.length, performance.now()]); lastGrowth = performance.now(); }
    lastFull = full;
    render();
    detect(t, full.slice(-100));
    errors = 0;
  };
  rec.onerror = async (e) => {
    // "network"は実際にはオンデバイス認識サービス未ロードの誤報告(crbug 520350511)。
    // モデルinstall直後はChromeの完全再起動が必要
    asrEl.textContent = e.error === "network"
      ? "⚠ ASR: 音声認識モデル準備中の可能性。ダウンロード完了後、Chromeの完全再起動(⌘Q)が必要です"
      : `⚠ ASR: ${e.error}`;
    if (e.error === "language-not-supported" && SR.available) {
      const a = await SR.available({ langs: ["ja-JP"], processLocally: true });
      asrEl.textContent = `⚠ ASR: lang-not-supported (available=${a})`;
      if (a === "downloadable") SR.install({ langs: ["ja-JP"], processLocally: true });
    }
    if (++errors > 5) rec.onend = null;
  };
  const start = () => {
    try { rec.start(dest.stream.getAudioTracks()[0]); asrEl.textContent = "🎤 認識待機…"; }
    catch (err) { asrEl.textContent = `⚠ ASR start: ${err.message}`; }
  };
  rec.onend = () => setTimeout(start, 1000);
  start();
  t.rec = rec;
}

// ---- ウォッチリスト検出 (衆: ASRテキスト / 参: 公式字幕cue) ----
const watchInput = document.getElementById("watch");
watchInput.value = localStorage.getItem("watchlist") || "";
watchInput.addEventListener("change", () => localStorage.setItem("watchlist", watchInput.value));
// 「|」で別名登録可(例: 塩川|しおかわ)。カタカナはひらがなに正規化して比較
const normalize = (s) => s.replace(/[ァ-ヶ]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0x60));
const watchWords = () =>
  watchInput.value.split(/[,、，\s]+/).map((w) => w.trim()).filter(Boolean)
    .flatMap((w) => w.split("|").map((a) => normalize(a.trim())).filter(Boolean));

// 編集距離1以内の部分文字列がtextに含まれるか(文字起こしの1文字ミスを許容)
function fuzzyIncludes(text, word) {
  if (text.includes(word)) return true;
  if (word.length < 4) return false; // 短語は誤爆しやすいので完全一致のみ
  const n = word.length;
  outer: for (let i = 0; i + n - 1 <= text.length - 1; i++) {
    // 置換1文字: 同長窓と比較
    let diff = 0;
    for (let j = 0; j < n && i + j < text.length; j++) {
      if (text[i + j] !== word[j] && ++diff > 1) continue outer;
    }
    if (diff <= 1 && i + n <= text.length) return true;
  }
  return false;
}

// コンテキストバイアシング: ウォッチ語+国会用語を優先語彙として認識エンジンに渡す(対応環境のみ)
// ウォッチリスト編集時は稼働中の全認識セッションに即時再適用する
function applyPhrases(rec) {
  if (!window.SpeechRecognitionPhrase) return;
  try {
    const terms = [...new Set([...watchWords(), "委員長", "委員会", "質疑", "答弁", "参考人", "理事", "法案", "附帯決議"])];
    rec.phrases = terms.map((w) => new SpeechRecognitionPhrase(w, 5.0));
  } catch (e) { console.warn("phrases未対応:", e); }
}
watchInput.addEventListener("change", () => {
  for (const t of tiles.values()) if (t.rec) applyPhrases(t.rec);
});

function detect(t, rawText) {
  const text = normalize(rawText);
  const hit = watchWords().find((w) => fuzzyIncludes(text, w));
  if (!hit) return;
  t.hitUntil = Date.now() + 90_000; // ヒット表示は90秒持続(発言が続く想定)
  t.el.classList.add("hit");
  if (document.getElementById("autoFocus").checked && !manualFocus && focusedId !== t.stream.id) {
    focusedId = t.stream.id;
    applyFocus();
  }
}
setInterval(() => {
  for (const t of tiles.values())
    if (t.hitUntil && Date.now() > t.hitUntil) { t.hitUntil = 0; t.el.classList.remove("hit"); }
}, 5000);

// ---- 視聴時刻の予約 (方針①: 手動の時刻予約アラーム) ----
// ASRの名前検出に頼らず、ユーザーが「この会議をこの時刻に視聴開始」と予約する。
// 予約時刻になったら該当タイルを自動フォーカス＋ビープ＋通知/トーストで知らせる。localStorageに永続化。
const RESV_KEY = "reservations";
let reservations = [];
try { reservations = JSON.parse(localStorage.getItem(RESV_KEY) || "[]"); } catch {}
// 過去(主に前日)の予約は無意味な上、起動直後に一斉発動してしまうので読み込み時に掃除する
reservations = reservations.filter((r) => r.at > Date.now());
const saveResv = () => localStorage.setItem(RESV_KEY, JSON.stringify(reservations));

const resvBtn = document.getElementById("resvBtn");
const resvPanel = document.getElementById("resvPanel");
const resvMeeting = document.getElementById("resvMeeting");
const resvTime = document.getElementById("resvTime");
const resvAdd = document.getElementById("resvAdd");
const resvList = document.getElementById("resvList");
const toastEl = document.getElementById("toast");

const houseLabel = (h) => (h === "shugiin" ? "衆" : "参");
const fmtClock = (ts) => {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
};
const fmtCountdown = (ms) => {
  if (ms <= 0) return "まもなく";
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  return m >= 60 ? `${Math.floor(m / 60)}時間${m % 60}分後` : m > 0 ? `あと${m}分` : `あと${s}秒`;
};

resvBtn.addEventListener("click", () => {
  resvPanel.classList.toggle("open");
  if (resvPanel.classList.contains("open")) { renderResvOptions(); renderResvList(); }
});

// 選択肢は現在中継中の会議(予約は当日のライブ視聴が前提)。編集中の選択はなるべく維持する
function renderResvOptions() {
  const prev = resvMeeting.value;
  resvMeeting.innerHTML = "";
  const live = [...tiles.values()];
  if (!live.length) {
    resvMeeting.innerHTML = `<option value="">中継中の会議がありません</option>`;
    resvAdd.disabled = true;
    return;
  }
  resvAdd.disabled = false;
  for (const t of live) {
    const s = t.stream;
    const o = document.createElement("option");
    o.value = s.id;
    o.textContent = `${houseLabel(s.house)} ${s.time ?? ""} ${s.name}`.trim();
    resvMeeting.appendChild(o);
  }
  if ([...resvMeeting.options].some((o) => o.value === prev)) resvMeeting.value = prev;
}

// +N分: 時刻入力を現在時刻+N分にセット
for (const b of resvPanel.querySelectorAll(".mini")) {
  b.addEventListener("click", () => {
    const d = new Date(Date.now() + Number(b.dataset.min) * 60_000);
    resvTime.value = `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  });
}

resvAdd.addEventListener("click", async () => {
  const id = resvMeeting.value;
  const t = tiles.get(id);
  if (!t || !resvTime.value) { showToast("⚠ 会議と時刻を指定してください"); return; }
  const [hh, mm] = resvTime.value.split(":").map(Number);
  const at = new Date(); at.setHours(hh, mm, 0, 0);
  if (at.getTime() <= Date.now()) { showToast("⚠ 過去の時刻は予約できません"); return; }
  const s = t.stream;
  reservations.push({
    rid: Date.now() + "-" + Math.random().toString(36).slice(2, 6),
    id, house: s.house, label: `${s.time ?? ""} ${s.name}`.trim(),
    at: at.getTime(), fired: false,
  });
  saveResv();
  resvTime.value = "";
  renderResvList();
  updateResvBadge();
  // 通知許可はユーザー操作のこのタイミングで要求する
  if ("Notification" in window && Notification.permission === "default") {
    try { await Notification.requestPermission(); } catch {}
  }
  showToast(`⏰ ${fmtClock(at.getTime())} に予約しました`);
});

function removeReservation(rid) {
  reservations = reservations.filter((r) => r.rid !== rid);
  saveResv();
  renderResvList();
  updateResvBadge();
}

function renderResvList() {
  resvList.innerHTML = "";
  for (const r of [...reservations].sort((a, b) => a.at - b.at)) {
    const li = document.createElement("li");
    if (r.fired) li.className = "fired";
    const meta = document.createElement("div"); meta.className = "meta";
    const t = document.createElement("span"); t.className = "t"; t.textContent = fmtClock(r.at);
    const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = `${houseLabel(r.house)} ${r.label}`;
    meta.append(t, nm);

    del.addEventListener("click", () => removeReservation(r.rid));

  }
}

function updateResvBadge() {
  resvBtn.classList.toggle("has", reservations.some((r) => !r.fired));
}

let toastTimer = 0;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3500);
}

// 予約発動の合図音(音声基盤が起動済みのときのみ)
function beep() {
  if (!actx) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine"; o.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, actx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.6);
    o.connect(g).connect(actx.destination);
    o.start(); o.stop(actx.currentTime + 0.62);
  } catch {}
}

function fireReservation(r) {
  r.fired = true;
  saveResv();
  const t = tiles.get(r.id);
  const name = `${houseLabel(r.house)} ${r.label}`;
  if (t) {
    focusedId = r.id;
    manualFocus = true; // 発動後はASRの自動フォーカスにフォーカスを奪われないようにする
    applyFocus();
    t.el.classList.add("resv");
    setTimeout(() => t.el.classList.remove("resv"), 6000);
    showToast(`▶ 予約時刻です: ${name}`);
  } else {
    showToast(`⚠ 予約した会議が見つかりません: ${name}`);
  }
  beep();
  if ("Notification" in window && Notification.permission === "granted") {
    try { new Notification("shusantv 視聴予約", { body: `${fmtClock(r.at)} ${name}` }); } catch {}
  }
  renderResvList();
  updateResvBadge();
}

// 5秒ごとに発動判定＋(パネル表示中は)カウントダウン更新
setInterval(() => {
  const now = Date.now();
  for (const r of reservations) if (!r.fired && now >= r.at) fireReservation(r);
  if (resvPanel.classList.contains("open")) renderResvList();
}, 5000);
updateResvBadge();

// ---- タイル ----
// サムネ(フォーカス時のプレビュー)用に時刻なし・「〜委員会/審査会」を削った短縮名も持たせる。
// さらに「経済産業→経産」のような定番略称に縮める
const NAME_ABBR = {
  経済産業: "経産", 厚生労働: "厚労", 農林水産: "農水", 国土交通: "国交",
  文部科学: "文科", 文教科学: "文科", 財務金融: "財金", 財政金融: "財金",
  外交防衛: "外防", 安全保障: "安保", 議院運営: "議運", 政治倫理: "政倫",
  災害対策: "災対", 行政監視: "行監", 決算行政監視: "決算行監",
  沖縄及び北方問題: "沖北", 北朝鮮による拉致問題等: "拉致",
  東日本大震災復興: "震災復興", 原子力問題調査: "原子力",
  国家基本政策: "国家基本", 政治倫理の確立及び公職選挙法改正: "倫理選挙",
};
function shortName(name) {
  const s = name.replace(/(特別)?委員会$|審査会$|調査会$/, "").replace(/に関する$/, "") || name;
  return NAME_ABBR[s] ?? s;
}
function setTileName(el, s) {
  el.querySelector(".nfull").textContent = `${s.time ?? ""} ${s.name}`.trim();
  el.querySelector(".nshort").textContent = shortName(s.name);
}

function makeTile(s) {
  const el = document.createElement("div");
  el.className = `tile ${s.house}` + (s.pending ? " pending" : "");
  el.innerHTML = `
    <video muted autoplay playsinline crossorigin="anonymous"></video>
    <div class="tally">ON AIR</div>
    <div class="pgm">🔊 音声</div>
    <div class="asr"></div>
    <div class="label">
      <span class="badge ${s.house}">${s.house === "shugiin" ? "衆" : "参"}</span>
      <span class="name"><span class="nfull"></span><span class="nshort"></span></span>
      <span class="quality"></span>
      <span class="muteicon">🔇</span>
    </div>`;
  setTileName(el, s);
  const video = el.querySelector("video");
  // 遅延削減: ライブエッジ近くで再生する。liveSyncDurationCount を小さくするほど
  // ライブに近づく(=低遅延)が、回線が細いと再バッファが増える。
  // maxLiveSyncPlaybackRate で、遅れた時に再生速度を少し上げてエッジに追従する(無音stallを避ける)。
  const hls = new Hls({
    capLevelToPlayerSize: false,
    startLevel: 0,
    subtitleDisplay: false,
    maxBufferLength: 6,            // 前方バッファを15→6sに圧縮
    liveSyncDurationCount: 1,      // ライブエッジ手前1セグメントで同期(既定3)
    liveMaxLatencyDurationCount: 5, // これ以上遅れたらエッジへシーク
    maxLiveSyncPlaybackRate: 1.15, // 遅れたら最大1.15倍速で追従(国会中継は音声主体なので控えめに)
    backBufferLength: 0,           // 後方バッファは保持しない
  });
  const t = { el, video, hls, stream: s, lowest: 0, highest: 0, audio: null, hitUntil: 0 };

  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    t.lowest = hls.levels.reduce((a, l, i) => (l.bitrate < hls.levels[a].bitrate ? i : a), 0);
    t.highest = hls.levels.reduce((a, l, i) => (l.bitrate > hls.levels[a].bitrate ? i : a), 0);
    hls.nextLevel = t.lowest;
    video.play().catch(() => {});
  });
  hls.on(Hls.Events.LEVEL_SWITCHED, (_, d) => {
    el.querySelector(".quality").textContent = d.level === t.highest && t.highest !== t.lowest ? "HD" : "";
  });
  let fails = 0;
  hls.on(Hls.Events.ERROR, (_, data) => {
    if (!data.fatal) return;
    if (++fails > 3) { removeTile(s.id); return; } // 中継終了済みのタイルは畳む
    setTimeout(() => hls.loadSource(s.m3u8), 5000);
  });
  hls.loadSource(s.m3u8);
  hls.attachMedia(video);
  el.addEventListener("click", () => clickTile(s.id));
  grid.appendChild(el);
  tiles.set(s.id, t);
  initAudio(t);
}

function removeTile(id) {
  const t = tiles.get(id);
  if (!t) return;
  if (t.rec) { t.rec.onend = null; t.rec.stop(); }
  if (t.capTimer) clearInterval(t.capTimer);
  t.hls.destroy();
  t.el.remove();
  tiles.delete(id);
  if (focusedId === id) { focusedId = null; manualFocus = false; }
  relayout();
}

// ---- フォーカス/音声 ----
let focusedId = null;
let manualFocus = false; // ユーザーが手動選択中は自動フォーカスを抑止
function clickTile(id) {
  if (focusedId === id) { focusedId = null; manualFocus = false; }
  else { focusedId = id; manualFocus = true; }
  applyFocus();
}
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && focusedId) { focusedId = null; manualFocus = false; applyFocus(); }
});

function applyFocus() {
  grid.classList.toggle("focusmode", !!focusedId);
  for (const [tid, t] of tiles) {
    const on = tid === focusedId;
    if (t.audio) t.audio.gain.gain.value = on ? 1 : 0;
    else t.video.muted = !on; // ゲート前のフォールバック
    t.el.classList.toggle("unmuted", on);
    t.el.querySelector(".muteicon").textContent = on ? "🔊" : "🔇";
    t.hls.nextLevel = on || allHigh ? t.highest : t.lowest;
  }
  relayout();
}

// ---- 帯域に余裕があれば全タイル高レート ----
let allHigh = false;
function adjustQuality() {
  if (!tiles.size) return;
  let need = 0, est = 0;
  for (const t of tiles.values()) {
    const lv = t.hls.levels;
    if (!lv?.length) return;
    need += lv[t.highest].bitrate;
    est = Math.max(est, t.hls.bandwidthEstimate || 0);
  }
  const wasHigh = allHigh;
  if (!allHigh && est > need * 2.0) allHigh = true;
  else if (allHigh && est < need * 1.3) allHigh = false;
  if (allHigh === wasHigh) return;
  for (const [tid, t] of tiles)
    t.hls.nextLevel = allHigh || tid === focusedId ? t.highest : t.lowest;
}
setInterval(adjustQuality, 15_000);

// ---- レイアウト: 画面全体に敷き詰め (クロップ前提でセル比4:3〜16:9を許容) ----
function relayout() {
  const n = tiles.size;
  if (!n) return;
  grid.style.height = `calc(100vh - ${document.querySelector("header").offsetHeight}px)`;
  const W = grid.clientWidth, H = grid.clientHeight, GAP = 8;
  for (const t of tiles.values()) {
    t.el.style.gridArea = "";
    t.el.style.height = ""; t.el.style.alignSelf = "";
    t.el.style.width = ""; t.el.style.justifySelf = "";
  }
  if (focusedId && tiles.has(focusedId) && n > 1) {
    // プレビューは目標サイズ(TGT)に達するまでサイドバーの列(縦長画面では段)を増やして確保し、
    // 残りを全部メインに渡す。全タイルともクロップ許容は16:9〜3:4。
    // メインの下限は横画面で3:4、縦長画面で16:9。プレビューはメインの2/3以下に抑える
    const others = n - 1;
    const inner = { w: W - 16, h: H - 16 }; // #grid の padding 8px ぶん
    const TGT = 340; // プレビュー幅の目標px。これ以上大きくせずメインに返す
    if (H > W) {
      // 縦長画面: フォーカスを上に、プレビューは下段に。段数mは面積を稼げる構成を選ぶ
      let best = null;
      for (let m = 1; m <= 4 && m <= others; m++) {
        const k = Math.ceil(others / m);
        const cellW = (inner.w - GAP * (k - 1)) / k;
        const avail = (inner.h - GAP * m - inner.w * 9 / 16) / m;
        const ho = Math.min(avail, cellW * 4 / 3, TGT * 3 / 4, 2 * (inner.h - GAP * m) / (3 + 2 * m));
        if (ho <= 0) continue;
        const tw = Math.min(cellW, ho * 16 / 9);
        if (!best || tw * ho > best.tw * best.ho * 1.05) best = { m, k, cellW, ho, tw };
      }
      if (best) {
        const { m, k, cellW, ho, tw } = best;
        const hf = Math.min(inner.h - GAP * m - m * ho, inner.w * 4 / 3);
        grid.style.gridTemplateColumns = `repeat(${k}, ${cellW}px)`;
        grid.style.gridTemplateRows = `${hf}px repeat(${m}, ${ho}px)`;
        grid.style.justifyContent = "center";
        grid.style.alignContent = "center";
        tiles.get(focusedId).el.style.gridArea = `1 / 1 / 2 / ${k + 1}`;
        let i = 0;
        for (const [tid, t] of tiles) if (tid !== focusedId) {
          t.el.style.gridArea = `${2 + Math.floor(i / k)} / ${1 + (i % k)}`;
          t.el.style.width = `${tw}px`;
          t.el.style.justifySelf = "center";
          i++;
        }
        return;
      }
    } else {
      // 横画面: フォーカスを左に、プレビューは右のサイドバーに。列数kは面積を稼げる構成を選ぶ
      let best = null;
      for (let k = 1; k <= 4 && k <= others; k++) {
        const r = Math.ceil(others / k);
        const cellH = (inner.h - GAP * (r - 1)) / r;
        const avail = (inner.w - GAP * k - inner.h * 3 / 4) / k;
        const wo = Math.min(avail, cellH * 16 / 9, TGT, 2 * (inner.w - GAP * k) / (3 + 2 * k));
        if (wo <= 0) continue;
        const th = Math.min(cellH, wo * 4 / 3);
        if (!best || wo * th > best.wo * best.th * 1.05) best = { k, r, cellH, wo, th };
      }
      if (best) {
        const { k, r, cellH, wo, th } = best;
        const wf = Math.min(inner.w - GAP * k - k * wo, inner.h * 16 / 9);
        grid.style.gridTemplateColumns = `${wf}px repeat(${k}, ${wo}px)`;
        grid.style.gridTemplateRows = `repeat(${r}, ${cellH}px)`;
        grid.style.justifyContent = "center";
        grid.style.alignContent = "center";
        tiles.get(focusedId).el.style.gridArea = `1 / 1 / ${r + 1} / 2`;
        let i = 0;
        for (const [tid, t] of tiles) if (tid !== focusedId) {
          t.el.style.gridArea = `${1 + Math.floor(i / k)} / ${2 + (i % k)}`;
          t.el.style.height = `${th}px`;
          t.el.style.alignSelf = "center";
          i++;
        }
        return;
      }
    }
    // ここに来るのは画面が極端に小さいときのみ。通常グリッドにフォールバック
  }
  let best = { cols: 1, area: 0, w: 0, h: 0 };
  for (let cols = 1; cols <= n; cols++) {
    const rows = Math.ceil(n / cols);
    let w = (W - GAP * (cols - 1)) / cols;
    let h = (H - GAP * (rows - 1)) / rows;
    const aspect = w / h;
    if (aspect > 16 / 9) w = h * 16 / 9;
    else if (aspect < 4 / 3) h = w * 3 / 4;
    if (w * h > best.area) best = { cols, area: w * h, w, h };
  }
  // セル寸法を明示し(アスペクト比4:3〜16:9に収めた値)、余りは余白として中央寄せ
  const rows = Math.ceil(n / best.cols);
  grid.style.gridTemplateColumns = `repeat(${best.cols}, ${best.w}px)`;
  grid.style.gridTemplateRows = `repeat(${rows}, ${best.h}px)`;
  grid.style.gridAutoRows = "";
  grid.style.justifyContent = "center";
  grid.style.alignContent = "center";
}
window.addEventListener("resize", relayout);

// ---- 一覧取得 ----
// 衆議院は m3u8 が CORS 開放されているためブラウザから全 room を直接プローブできる。
// streams.json (Actions cron) が遅延していても開始直後の中継を拾う
const SHU_ROOMS = Array.from({ length: 18 }, (_, i) => `room${String(i + 1).padStart(2, "0")}`);
async function probeShugiin(known) {
  const found = [];
  await Promise.all(
    SHU_ROOMS.filter((r) => !known.has(r)).map(async (roomId) => {
      try {
        const url = `https://hlslive.shugiintv.go.jp/${roomId}/amlst:${roomId}/playlist.m3u8`;
        const res = await fetch(url, { cache: "no-store" });
        if (res.ok && (await res.text()).includes("#EXTM3U"))
          found.push({ house: "shugiin", id: roomId, name: `中継中 (${roomId})`, time: "", m3u8: url });
      } catch {}
    })
  );
  return found;
}

async function refresh() {
  try {
    const { streams, updatedAt, errors } = await (await fetch("streams.json" + location.search, { cache: "no-store" })).json();
    if (!location.search.includes("demo")) {
      const knownRooms = new Set(streams.map((s) => s.id));
      streams.push(...(await probeShugiin(knownRooms)));
    }
    const ids = new Set(streams.map((s) => s.id));
    for (const id of tiles.keys()) if (!ids.has(id)) removeTile(id);
    for (const s of streams) {
      const t = tiles.get(s.id);
      if (!t) { makeTile(s); continue; }
      // 既存タイルの表示情報を更新(プローブ仮名→正式名、開会待ち解除など)
      t.stream = s;
      setTileName(t.el, s);
      t.el.classList.toggle("pending", !!s.pending);
    }
    relayout();
    if (resvPanel.classList.contains("open")) renderResvOptions();
    statusEl.textContent =
      `${streams.length}件中継中 (衆${streams.filter(s=>s.house==="shugiin").length}/参${streams.filter(s=>s.house==="sangiin").length})` +
      ` 更新: ${new Date(updatedAt).toLocaleTimeString("ja-JP")}` +
      (errors.length ? ` ⚠ ${errors.join("; ")}` : "");
    grid.querySelector(".empty")?.remove();
    if (!streams.length) grid.insertAdjacentHTML("beforeend", `<div class="empty">現在中継中の会議はありません</div>`);
  } catch (e) {
    statusEl.textContent = "一覧取得エラー: " + e;
  }
}
refresh();
setInterval(refresh, 60_000);
</script>
</body>
</html>
