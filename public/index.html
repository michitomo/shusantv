<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>shusantv — 国会中継グリッド</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --glass: rgba(18, 18, 22, .55);
    --glass-border: rgba(255, 255, 255, .08);
    --accent: #5fe0b7;
    --tally: #ff3b30;
    --shu: #5b9bd5;
    --san: #d57aa5;
  }
  body { margin: 0; background: #050507; color: #eee;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, sans-serif; }

  /* ガラスのヘッダーバー */
  header { display: flex; align-items: center; gap: 14px; padding: 8px 16px; flex-wrap: wrap;
    background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--glass-border); }
  header h1 { font-size: 14px; margin: 0; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
  header h1::before { content: "●"; color: var(--tally); font-size: 9px; vertical-align: 2px; margin-right: 7px;
    animation: pulse 2.4s ease-in-out infinite; }
  header .status { color: #9a9aa2; font-size: 11px; letter-spacing: .02em; }
  header .credit { margin-left: auto; }
  header .credit a { color: #7da7c7; text-decoration: none; }
  header .credit a:hover { text-decoration: underline; }
  #watch { width: 300px; background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); color: #eee;
    border-radius: 999px; padding: 4px 12px; font-size: 12px; outline: none; transition: border-color .2s; }
  #watch:focus { border-color: var(--accent); }
  label.auto { font-size: 11px; color: #9a9aa2; user-select: none; display: flex; align-items: center; gap: 4px; }
  label.auto input { accent-color: var(--accent); }

  #grid { display: grid; gap: 8px; padding: 8px; height: calc(100vh - 49px); box-sizing: border-box; }

  /* タイル: 枠は消し、わずかな境界線と影 */
  .tile { position: relative; background: #000; border-radius: 10px; overflow: hidden; cursor: pointer;
    min-height: 0; min-width: 0; container-type: size;
    outline: 1px solid var(--glass-border); outline-offset: -1px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    transition: outline-color .25s, box-shadow .25s, filter .25s; }
  .tile:hover { filter: brightness(1.06); }
  .tile.unmuted { outline: 2px solid var(--accent); outline-offset: -2px;
    box-shadow: 0 4px 28px rgba(95,224,183,.18); }
  .tile.hit { outline: 2px solid var(--tally); outline-offset: -2px;
    box-shadow: 0 0 26px rgba(255,59,48,.35); }
  .tile video { width: 100%; height: 100%; display: block; background: #000; object-fit: cover; }

  /* タリーランプ (ウォッチヒット時) */
  .tally { position: absolute; top: 8px; right: 8px; z-index: 2; display: none; align-items: center; gap: 6px;
    background: rgba(0,0,0,.55); backdrop-filter: blur(8px); border: 1px solid rgba(255,59,48,.5);
    color: #ff6b62; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 800; letter-spacing: .12em; }
  .tally::before { content: "●"; color: var(--tally); font-size: 9px; animation: pulse 1.1s ease-in-out infinite; }
  .tile.hit .tally { display: flex; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }

  /* 下部ラベル: ガラス帯 + 院カラードット */
  .tile .label { position: absolute; left: 0; right: 0; bottom: 0; padding: 7px 12px;
    font-size: 14px; font-weight: 600; letter-spacing: .02em;
    background: linear-gradient(transparent, rgba(5,5,7,.72) 38%);
    backdrop-filter: blur(2px);
    display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 11px; font-weight: 800; flex-shrink: 0; display: flex; align-items: center; gap: 5px;
    color: #c9c9cf; }
  .badge::before { content: "●"; font-size: 8px; }
  .badge.shugiin::before { color: var(--shu); }
  .badge.sangiin::before { color: var(--san); }
  .muteicon { margin-left: auto; opacity: .65; font-size: 12px; }
  .quality { font-size: 9px; font-weight: 800; color: #8fce6a; border: 1px solid rgba(143,206,106,.55);
    border-radius: 3px; padding: 0 4px; flex-shrink: 0; letter-spacing: .06em; }
  .quality:empty { display: none; }

  /* 字幕バブル: ガラス */
  .asr { position: absolute; left: 6%; right: 6%; bottom: 11%; pointer-events: none;
    display: flex; justify-content: center; }
  .asr:empty { display: none; }
  .asr .bubble { background: rgba(10, 10, 14, .58); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); border-radius: .6em; padding: .3em .65em;
    font-size: max(3.4cqw, 14px); line-height: 1.35; font-weight: 600; color: #ffeebe;
    width: 88%; box-sizing: border-box;
    text-align: left; white-space: pre-line; word-break: auto-phrase;
    max-height: calc(1.35em * 3 + .6em - 4px); overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end; }
  .asr .bubble .old { color: #a9a9a2; }
  #grid.focusmode .tile:not(.unmuted) .bubble {
    font-size: max(4cqw, 14px);
    max-height: calc(1.35em * 5 + .6em - 4px);
  }
  .pending video { opacity: .3; }
  .empty { padding: 48px; color: #6a6a72; text-align: center; letter-spacing: .1em; }

  /* 開始ゲート */
  #gate { position: fixed; inset: 0; background: rgba(5,5,7,.6); backdrop-filter: blur(18px);
    display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; }
  #gate::before { content: "SHUSANTV"; font-size: 13px; font-weight: 800; letter-spacing: .3em; color: #9a9aa2; }
  #gate::after { content: "クリックで字幕には音声認識を使用します(初回はモデルをダウンロード)";
    font-size: 11px; color: #6a6a72; }
</style>
</head>
<body>
<header>
  <h1>shusantv</h1>
  <span class="status" id="status">読み込み中…</span>
  <input id="watch" placeholder="ウォッチ: 議員名,会派をカンマ区切り">
  <label class="auto"><input type="checkbox" id="autoFocus" checked> ヒットで自動フォーカス</label>
  <span class="status credit">映像:
    <a href="https://www.shugiintv.go.jp/jp/" target="_blank" rel="noopener">衆議院インターネット審議中継</a> /
    <a href="https://www.webtv.sangiin.go.jp/webtv/" target="_blank" rel="noopener">参議院インターネット審議中継</a>
    （著作権は各議院に帰属。本サイトは非公式の個人用ビューアです）</span>
</header>
<div id="grid"></div>
<div id="gate">クリックで開始（音声・発言認識の有効化）</div>
<script type="module">
// BudouX: 文節相当の区切りで字幕バブルを組む(Google製・Chrome の word-break:auto-phrase と同等)
import { loadDefaultJapaneseParser } from "https://cdn.jsdelivr.net/npm/budoux@0.6.2/+esm";
window.budouxParser = loadDefaultJapaneseParser();
</script>
<script>
const grid = document.getElementById("grid");
const statusEl = document.getElementById("status");
const tiles = new Map();
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ---- 音声基盤 ----
// Chromeでは muted な video の音声キャプチャが無音になる既知バグがあるため、
// video自体は常にunmuteし、WebAudioで「認識用(フル音声)」と「スピーカー(GainNode)」に分岐する。
// AudioContextはユーザー操作後でないと動かないので初回クリックのゲートを置く。
let actx = null;
document.getElementById("gate").addEventListener("click", async function () {
  actx = new AudioContext();
  this.remove();
  // オンデバイス認識のja-JP利用権はオリジン単位。未取得ならこのオリジン用にinstallしてから始める
  if (SR?.available) {
    try {
      let a = await SR.available({ langs: ["ja-JP"], processLocally: true });
      if (a === "downloadable") {
        statusEl.textContent = "音声認識の日本語パックを準備中…";
        await SR.install({ langs: ["ja-JP"], processLocally: true });
        a = await SR.available({ langs: ["ja-JP"], processLocally: true });
      }
      if (a !== "available") statusEl.textContent = `⚠ オンデバイス音声認識が使えません (${a})`;
    } catch (e) { statusEl.textContent = `⚠ ASR初期化: ${e}`; }
  }
  for (const t of tiles.values()) initAudio(t);
});

function initAudio(t) {
  if (!actx || t.audio) return;
  t.video.muted = false;
  const src = actx.createMediaElementSource(t.video);
  const gain = actx.createGain();
  gain.gain.value = 0;
  src.connect(gain).connect(actx.destination);
  t.audio = { src, gain };
  if (SR) startAsr(t); // 衆参とも同じASR字幕(参院公式字幕は検出用に裏で併用)
}

// ---- 衆議院: ブラウザ内蔵オンデバイス音声認識 ----
// 注意: SODA(SpeechRecognition.install)導入直後はChrome完全再起動が必要。
// 未ロードだと "network" エラーで即終了する(Chrome 149時点の誤報告, crbug 520350511)
function startAsr(t) {
  const dest = actx.createMediaStreamDestination();
  t.audio.src.connect(dest);
  const rec = new SR();
  rec.lang = "ja-JP";
  rec.continuous = true;
  rec.interimResults = true;
  rec.processLocally = true;
  applyPhrases(rec); // コンテキストバイアシング(ウォッチ語を優先語彙に)
  const asrEl = t.el.querySelector(".asr");
  let errors = 0;
  let brightBase = 0; // この文字位置までは「古い」= グレー表示
  let marks = [];     // [文字位置, 時刻] 新しい文字の出現記録(時間フェード用)
  const FADE = 500, TS = "\u2009";
  const IDLE_HIDE = 30_000; // 新しい発言が来なければ字幕を消す(散会後に残さない)
  let lastGrowth = 0;

  // 直近FADE ms以内に出た文字だけ明色、それ以前はグレー。改行なし(自然折り返しのみ)
  let lastFull = "";
  function render() {
    const now = performance.now();
    if (lastGrowth && now - lastGrowth > IDLE_HIDE) { asrEl.innerHTML = ""; return; }
    for (const [len, tm] of marks) if (now - tm > FADE) brightBase = Math.max(brightBase, len);
    marks = marks.filter(([, tm]) => now - tm <= FADE);
    const text = lastFull.slice(-150); // 表示は末尾のみ(3行高でクリップされる)
    asrEl.innerHTML = "";
    if (!text) return;
    const b = document.createElement("div");
    b.className = "bubble";
    const inner = document.createElement("div"); // flex(下端寄せ)の単一子要素
    const phrases = window.budouxParser ? window.budouxParser.parse(text) : [text];
    const oldParts = [], newParts = [];
    let pos = lastFull.length - text.length;
    for (const ph of phrases) {
      (pos + ph.length <= brightBase ? oldParts : newParts).push(ph);
      pos += ph.length;
    }
    if (oldParts.length) {
      const sp = document.createElement("span");
      sp.className = "old";
      sp.textContent = oldParts.join(TS) + (newParts.length ? TS : "");
      inner.appendChild(sp);
    }
    if (newParts.length) {
      const sp = document.createElement("span");
      sp.textContent = newParts.join(TS);
      inner.appendChild(sp);
    }
    b.appendChild(inner);
    asrEl.appendChild(b);
  }
  t.capTimer = setInterval(render, 200); // 結果が来なくてもフェードを進める
  // ポーズ(isFinal)ごとに句読点を補う: 文末形なら「。」、続きそうなら「、」
  const punct = (s) =>
    !s || /[。、．，！？!?]$/.test(s) ? s
    : /(です|ます|でした|ました|ません|ございます|であります)(ね|よ)?$/.test(s) ? s + "。"
    : s + "、";
  rec.onresult = (e) => {
    let full = "";
    for (const r of e.results) full += r.isFinal ? punct(r[0].transcript) : r[0].transcript;
    if (full.length < lastFull.length) { brightBase = 0; marks = []; } // セッション再開でリセット
    if (full.length > lastFull.length) { marks.push([lastFull.length, performance.now()]); lastGrowth = performance.now(); }
    lastFull = full;
    render();
    detect(t, full.slice(-100));
    errors = 0;
  };
  rec.onerror = async (e) => {
    // "network"は実際にはオンデバイス認識サービス未ロードの誤報告(crbug 520350511)。
    // モデルinstall直後はChromeの完全再起動が必要
    asrEl.textContent = e.error === "network"
      ? "⚠ ASR: 音声認識モデル準備中の可能性。ダウンロード完了後、Chromeの完全再起動(⌘Q)が必要です"
      : `⚠ ASR: ${e.error}`;
    if (e.error === "language-not-supported" && SR.available) {
      const a = await SR.available({ langs: ["ja-JP"], processLocally: true });
      asrEl.textContent = `⚠ ASR: lang-not-supported (available=${a})`;
      if (a === "downloadable") SR.install({ langs: ["ja-JP"], processLocally: true });
    }
    if (++errors > 5) rec.onend = null;
  };
  const start = () => {
    try { rec.start(dest.stream.getAudioTracks()[0]); asrEl.textContent = "🎤 認識待機…"; }
    catch (err) { asrEl.textContent = `⚠ ASR start: ${err.message}`; }
  };
  rec.onend = () => setTimeout(start, 1000);
  start();
  t.rec = rec;
}

// ---- ウォッチリスト検出 (衆: ASRテキスト / 参: 公式字幕cue) ----
const watchInput = document.getElementById("watch");
watchInput.value = localStorage.getItem("watchlist") || "";
watchInput.addEventListener("change", () => localStorage.setItem("watchlist", watchInput.value));
// 「|」で別名登録可(例: 塩川|しおかわ)。カタカナはひらがなに正規化して比較
const normalize = (s) => s.replace(/[ァ-ヶ]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0x60));
const watchWords = () =>
  watchInput.value.split(/[,、，\s]+/).map((w) => w.trim()).filter(Boolean)
    .flatMap((w) => w.split("|").map((a) => normalize(a.trim())).filter(Boolean));

// 編集距離1以内の部分文字列がtextに含まれるか(文字起こしの1文字ミスを許容)
function fuzzyIncludes(text, word) {
  if (text.includes(word)) return true;
  if (word.length < 4) return false; // 短語は誤爆しやすいので完全一致のみ
  const n = word.length;
  outer: for (let i = 0; i + n - 1 <= text.length - 1; i++) {
    // 置換1文字: 同長窓と比較
    let diff = 0;
    for (let j = 0; j < n && i + j < text.length; j++) {
      if (text[i + j] !== word[j] && ++diff > 1) continue outer;
    }
    if (diff <= 1 && i + n <= text.length) return true;
  }
  return false;
}

// コンテキストバイアシング: ウォッチ語+国会用語を優先語彙として認識エンジンに渡す(対応環境のみ)
// ウォッチリスト編集時は稼働中の全認識セッションに即時再適用する
function applyPhrases(rec) {
  if (!window.SpeechRecognitionPhrase) return;
  try {
    const terms = [...new Set([...watchWords(), "委員長", "委員会", "質疑", "答弁", "参考人", "理事", "法案", "附帯決議"])];
    rec.phrases = terms.map((w) => new SpeechRecognitionPhrase(w, 5.0));
  } catch (e) { console.warn("phrases未対応:", e); }
}
watchInput.addEventListener("change", () => {
  for (const t of tiles.values()) if (t.rec) applyPhrases(t.rec);
});

function detect(t, rawText) {
  const text = normalize(rawText);
  const hit = watchWords().find((w) => fuzzyIncludes(text, w));
  if (!hit) return;
  t.hitUntil = Date.now() + 90_000; // ヒット表示は90秒持続(発言が続く想定)
  t.el.classList.add("hit");
  if (document.getElementById("autoFocus").checked && !manualFocus && focusedId !== t.stream.id) {
    focusedId = t.stream.id;
    applyFocus();
  }
}
setInterval(() => {
  for (const t of tiles.values())
    if (t.hitUntil && Date.now() > t.hitUntil) { t.hitUntil = 0; t.el.classList.remove("hit"); }
}, 5000);

// ---- タイル ----
function makeTile(s) {
  const el = document.createElement("div");
  el.className = "tile" + (s.pending ? " pending" : "");
  el.innerHTML = `
    <video muted autoplay playsinline crossorigin="anonymous"></video>
    <div class="tally">ON AIR</div>
    <div class="asr"></div>
    <div class="label">
      <span class="badge ${s.house}">${s.house === "shugiin" ? "衆" : "参"}</span>
      <span class="name"></span>
      <span class="quality"></span>
      <span class="muteicon">🔇</span>
    </div>`;
  el.querySelector(".name").textContent = `${s.time} ${s.name}`;
  const video = el.querySelector("video");
  const hls = new Hls({ capLevelToPlayerSize: false, startLevel: 0, maxBufferLength: 15, subtitleDisplay: false });
  const t = { el, video, hls, stream: s, lowest: 0, highest: 0, audio: null, hitUntil: 0 };

  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    t.lowest = hls.levels.reduce((a, l, i) => (l.bitrate < hls.levels[a].bitrate ? i : a), 0);
    t.highest = hls.levels.reduce((a, l, i) => (l.bitrate > hls.levels[a].bitrate ? i : a), 0);
    hls.nextLevel = t.lowest;
    video.play().catch(() => {});
  });
  hls.on(Hls.Events.LEVEL_SWITCHED, (_, d) => {
    el.querySelector(".quality").textContent = d.level === t.highest && t.highest !== t.lowest ? "HD" : "";
  });
  let fails = 0;
  hls.on(Hls.Events.ERROR, (_, data) => {
    if (!data.fatal) return;
    if (++fails > 3) { removeTile(s.id); return; } // 中継終了済みのタイルは畳む
    setTimeout(() => hls.loadSource(s.m3u8), 5000);
  });
  hls.loadSource(s.m3u8);
  hls.attachMedia(video);
  el.addEventListener("click", () => clickTile(s.id));
  grid.appendChild(el);
  tiles.set(s.id, t);
  initAudio(t);
}

function removeTile(id) {
  const t = tiles.get(id);
  if (!t) return;
  if (t.rec) { t.rec.onend = null; t.rec.stop(); }
  if (t.capTimer) clearInterval(t.capTimer);
  t.hls.destroy();
  t.el.remove();
  tiles.delete(id);
  if (focusedId === id) { focusedId = null; manualFocus = false; }
  relayout();
}

// ---- フォーカス/音声 ----
let focusedId = null;
let manualFocus = false; // ユーザーが手動選択中は自動フォーカスを抑止
function clickTile(id) {
  if (focusedId === id) { focusedId = null; manualFocus = false; }
  else { focusedId = id; manualFocus = true; }
  applyFocus();
}
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && focusedId) { focusedId = null; manualFocus = false; applyFocus(); }
});

function applyFocus() {
  grid.classList.toggle("focusmode", !!focusedId);
  for (const [tid, t] of tiles) {
    const on = tid === focusedId;
    if (t.audio) t.audio.gain.gain.value = on ? 1 : 0;
    else t.video.muted = !on; // ゲート前のフォールバック
    t.el.classList.toggle("unmuted", on);
    t.el.querySelector(".muteicon").textContent = on ? "🔊" : "🔇";
    t.hls.nextLevel = on || allHigh ? t.highest : t.lowest;
  }
  relayout();
}

// ---- 帯域に余裕があれば全タイル高レート ----
let allHigh = false;
function adjustQuality() {
  if (!tiles.size) return;
  let need = 0, est = 0;
  for (const t of tiles.values()) {
    const lv = t.hls.levels;
    if (!lv?.length) return;
    need += lv[t.highest].bitrate;
    est = Math.max(est, t.hls.bandwidthEstimate || 0);
  }
  const wasHigh = allHigh;
  if (!allHigh && est > need * 2.0) allHigh = true;
  else if (allHigh && est < need * 1.3) allHigh = false;
  if (allHigh === wasHigh) return;
  for (const [tid, t] of tiles)
    t.hls.nextLevel = allHigh || tid === focusedId ? t.highest : t.lowest;
}
setInterval(adjustQuality, 15_000);

// ---- レイアウト: 画面全体に敷き詰め (クロップ前提でセル比4:3〜16:9を許容) ----
function relayout() {
  const n = tiles.size;
  if (!n) return;
  grid.style.height = `calc(100vh - ${document.querySelector("header").offsetHeight}px)`;
  const W = grid.clientWidth, H = grid.clientHeight, GAP = 8;
  for (const t of tiles.values()) t.el.style.gridArea = "";
  if (focusedId && tiles.has(focusedId) && n > 1) {
    const others = n - 1;
    grid.style.justifyContent = "";
    grid.style.alignContent = "";
    if (H > W) {
      // 縦長画面: フォーカスを上に大きく、残りは下に横並び
      grid.style.gridTemplateColumns = `repeat(${others}, 1fr)`;
      grid.style.gridTemplateRows = "4fr 1fr";
      tiles.get(focusedId).el.style.gridArea = `1 / 1 / 2 / ${others + 1}`;
      let col = 1;
      for (const [tid, t] of tiles) if (tid !== focusedId) t.el.style.gridArea = `2 / ${col++}`;
    } else {
      grid.style.gridTemplateColumns = "4fr 1fr";
      grid.style.gridTemplateRows = `repeat(${others}, 1fr)`;
      tiles.get(focusedId).el.style.gridArea = `1 / 1 / ${others + 1} / 2`;
      let row = 1;
      for (const [tid, t] of tiles) if (tid !== focusedId) t.el.style.gridArea = `${row++} / 2`;
    }
    return;
  }
  let best = { cols: 1, area: 0, w: 0, h: 0 };
  for (let cols = 1; cols <= n; cols++) {
    const rows = Math.ceil(n / cols);
    let w = (W - GAP * (cols - 1)) / cols;
    let h = (H - GAP * (rows - 1)) / rows;
    const aspect = w / h;
    if (aspect > 16 / 9) w = h * 16 / 9;
    else if (aspect < 4 / 3) h = w * 3 / 4;
    if (w * h > best.area) best = { cols, area: w * h, w, h };
  }
  // セル寸法を明示し(アスペクト比4:3〜16:9に収めた値)、余りは余白として中央寄せ
  const rows = Math.ceil(n / best.cols);
  grid.style.gridTemplateColumns = `repeat(${best.cols}, ${best.w}px)`;
  grid.style.gridTemplateRows = `repeat(${rows}, ${best.h}px)`;
  grid.style.gridAutoRows = "";
  grid.style.justifyContent = "center";
  grid.style.alignContent = "center";
}
window.addEventListener("resize", relayout);

// ---- 一覧取得 ----
// 衆議院は m3u8 が CORS 開放されているためブラウザから全 room を直接プローブできる。
// streams.json (Actions cron) が遅延していても開始直後の中継を拾う
const SHU_ROOMS = Array.from({ length: 18 }, (_, i) => `room${String(i + 1).padStart(2, "0")}`);
async function probeShugiin(known) {
  const found = [];
  await Promise.all(
    SHU_ROOMS.filter((r) => !known.has(r)).map(async (roomId) => {
      try {
        const url = `https://hlslive.shugiintv.go.jp/${roomId}/amlst:${roomId}/playlist.m3u8`;
        const res = await fetch(url, { cache: "no-store" });
        if (res.ok && (await res.text()).includes("#EXTM3U"))
          found.push({ house: "shugiin", id: roomId, name: `中継中 (${roomId})`, time: "", m3u8: url });
      } catch {}
    })
  );
  return found;
}

async function refresh() {
  try {
    const { streams, updatedAt, errors } = await (await fetch("streams.json" + location.search, { cache: "no-store" })).json();
    if (!location.search.includes("demo")) {
      const knownRooms = new Set(streams.map((s) => s.id));
      streams.push(...(await probeShugiin(knownRooms)));
    }
    const ids = new Set(streams.map((s) => s.id));
    for (const id of tiles.keys()) if (!ids.has(id)) removeTile(id);
    for (const s of streams) {
      const t = tiles.get(s.id);
      if (!t) { makeTile(s); continue; }
      // 既存タイルの表示情報を更新(プローブ仮名→正式名、開会待ち解除など)
      t.stream = s;
      t.el.querySelector(".name").textContent = `${s.time ?? ""} ${s.name}`.trim();
      t.el.classList.toggle("pending", !!s.pending);
    }
    relayout();
    statusEl.textContent =
      `${streams.length}件中継中 (衆${streams.filter(s=>s.house==="shugiin").length}/参${streams.filter(s=>s.house==="sangiin").length})` +
      ` 更新: ${new Date(updatedAt).toLocaleTimeString("ja-JP")}` +
      (errors.length ? ` ⚠ ${errors.join("; ")}` : "");
    grid.querySelector(".empty")?.remove();
    if (!streams.length) grid.insertAdjacentHTML("beforeend", `<div class="empty">現在中継中の会議はありません</div>`);
  } catch (e) {
    statusEl.textContent = "一覧取得エラー: " + e;
  }
}
refresh();
setInterval(refresh, 60_000);
</script>
