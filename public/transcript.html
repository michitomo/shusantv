<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shusantv — 文字起こし</title>
<style>
  :root {
    color-scheme: dark;
    --glass: rgba(18, 18, 22, .55);
    --glass-border: rgba(255, 255, 255, .08);
    --accent: #5fe0b7;
    --tally: #ff3b30;
    --san: #d57aa5;
  }
  body { margin: 0; background: #050507; color: #eee;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, sans-serif; }

  header { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; flex-wrap: wrap;
    background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--glass-border); }
  header h1 { font-size: 14px; margin: 0; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
  header h1 a { color: inherit; text-decoration: none; }
  header h1 a:hover { color: var(--accent); }
  header .status { color: #9a9aa2; font-size: 11px; letter-spacing: .02em; }
  select, input[type="search"], button {
    background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); color: #eee;
    border-radius: 999px; padding: 4px 12px; font-size: 12px; outline: none; }
  select:focus, input[type="search"]:focus { border-color: var(--accent); }
  select { max-width: 320px; }
  button { cursor: pointer; transition: border-color .2s; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: default; }
  label.follow { font-size: 11px; color: #9a9aa2; user-select: none; display: flex; align-items: center; gap: 4px; }
  label.follow input { accent-color: var(--accent); }
  .live-dot::before { content: "●"; color: var(--tally); font-size: 9px; margin-right: 5px;
    animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }

  #transcript { max-width: 860px; margin: 0 auto; padding: 16px 16px 80px; }
  .cue { display: flex; gap: 14px; padding: 5px 10px; border-radius: 8px; line-height: 1.7; }
  .cue:hover { background: rgba(255,255,255,.04); }
  .cue.hidden { display: none; }
  .cue .t { flex-shrink: 0; width: 72px; color: #7da7c7; font-size: 12px; line-height: 2;
    font-variant-numeric: tabular-nums; text-align: right; cursor: default; }
  .cue .txt { font-size: 14.5px; }
  .cue .txt mark { background: rgba(95,224,183,.3); color: #fff; border-radius: 3px; }
  .gap { text-align: center; color: #55555e; font-size: 11px; letter-spacing: .2em; padding: 14px 0; }
  #message { padding: 48px; color: #6a6a72; text-align: center; letter-spacing: .1em; font-size: 13px; }
  #message.error { color: #c97a7a; }

  /* ---- AI要約ビュー (kokkaidb風 質疑応答カード) ---- */
  #summary { max-width: 880px; margin: 0 auto; padding: 16px 16px 80px; }
  #summary .sumbar { margin: 0 0 12px; padding: 6px 12px; border-radius: 8px;
    background: rgba(255,255,255,.04); border: 1px solid var(--glass-border); color: #9a9aa2; font-size: 11px; }
  .qa-count { font-size: 18px; font-weight: 800; margin: 6px 0 14px; }
  .qa-card { border: 1px solid var(--glass-border); border-radius: 10px; overflow: hidden; margin: 0 0 16px;
    background: rgba(255,255,255,.02); }
  .qa-card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 14px; background: rgba(255,255,255,.05); border-bottom: 1px solid var(--glass-border); }
  .qa-title { font-size: 15px; font-weight: 800; color: #eee; }
  .qa-time { flex-shrink: 0; font-size: 12px; color: #7da7c7; font-variant-numeric: tabular-nums; }
  .qa-row { display: flex; align-items: stretch; }
  .qa-row + .qa-row { border-top: 1px solid var(--glass-border); }
  .qa-label { flex-shrink: 0; width: 60px; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 800;
    border-left: 3px solid transparent; }
  .qa-content { flex: 1; padding: 10px 14px; min-width: 0; }
  .qa-speaker { font-size: 13px; color: #aab; margin-bottom: 5px; }
  .qa-speaker b { color: #eee; font-weight: 800; }
  .qa-speaker .note { color: #8a8a92; font-weight: 400; margin-left: 4px; }
  .qa-text { font-size: 13.5px; line-height: 1.75; color: #d8d8de; }
  .qa-bullets { margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.75; color: #d8d8de; }
  .qa-bullets li { margin: 2px 0; }
  .qa-row--q .qa-label { color: #7da7c7; background: rgba(125,167,199,.10); border-left-color: #7da7c7; }
  .qa-row--a .qa-label { color: #5fe0b7; background: rgba(95,224,183,.10); border-left-color: #5fe0b7; }
  .qa-row--n .qa-label { color: #9a9aa2; background: rgba(255,255,255,.04); border-left-color: #6a6a72; }
  /* 行を増やさず、ラベル(質問/答弁/進行)をクリックでその発言の全文を展開する */
  .qa-label.expandable { cursor: pointer; }
  .qa-label.expandable::after { content: "▶"; display: block; font-size: 9px; font-weight: 400; margin-top: 3px; opacity: .65; }
  .qa-label.expandable.open::after { content: "▼"; }
  .qa-card-head.expandable { cursor: pointer; } /* 発言行を持たない質疑(手続き等)はヘッダ自体で展開 */
  .qa-card-head.expandable .qa-title::after { content: " ▶"; font-size: 10px; opacity: .6; }
  .qa-card-head.expandable.open .qa-title::after { content: " ▼"; }
  .raw-body { margin-top: 8px; padding-left: 10px; border-left: 1px solid var(--glass-border); }
  .qa-card > .raw-body { margin: 0; padding: 8px 14px 10px; }
  .raw-body .rl { display: flex; gap: 10px; line-height: 1.6; }
  .raw-body .rl .rt { flex-shrink: 0; width: 64px; text-align: right; color: #5d7e96; font-size: 11px;
    font-variant-numeric: tabular-nums; }
  .raw-body .rl .rx { font-size: 13px; color: #b8b8c0; }

  /* ---- 設定パネル ---- */
  #settings { position: fixed; top: 52px; right: 16px; z-index: 10; width: 300px; max-width: calc(100vw - 32px);
    background: rgba(20,20,26,.96); border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px;
    backdrop-filter: blur(14px); box-shadow: 0 10px 40px rgba(0,0,0,.5); display: none; }
  #settings.open { display: block; }
  #settings h3 { margin: 0 0 8px; font-size: 12px; letter-spacing: .08em; color: #9a9aa2; }
  #settings label { display: block; font-size: 11px; color: #9a9aa2; margin: 8px 0 3px; }
  #settings input, #settings select { width: 100%; box-sizing: border-box; border-radius: 8px; }
  #settings .row { display: flex; gap: 8px; margin-top: 12px; }
  #settings .hint { font-size: 10.5px; color: #6a6a72; line-height: 1.6; margin-top: 8px; }
  #settings .hint a { color: #7da7c7; }
  .sumbar { font-size: 11px; color: #9a9aa2; }

  footer { position: fixed; left: 0; right: 0; bottom: 0; padding: 6px 16px;
    background: var(--glass); backdrop-filter: blur(14px); border-top: 1px solid var(--glass-border);
    color: #6a6a72; font-size: 10px; text-align: center; }
  footer a { color: #7da7c7; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1><a href="./">shusantv</a> <span style="color:#6a6a72">/ 文字起こし</span></h1>
  <select id="meeting"><option value="">読み込み中…</option></select>
  <input id="filter" type="search" placeholder="絞り込み (議員名・キーワード)">
  <label class="follow"><input type="checkbox" id="follow" checked> 最新に追尾</label>
  <button id="aiBtn" disabled>AI要約</button>
  <button id="viewToggle" hidden>原文</button>
  <button id="dlTxt" disabled>TXT</button>
  <button id="dlVtt" disabled>VTT</button>
  <button id="gear" title="AI要約の設定">⚙</button>
  <span class="status" id="status"></span>
</header>
<div id="settings">
  <h3>AI要約の設定 (BYOK)</h3>
  <label for="setKey">OpenRouter APIキー</label>
  <input id="setKey" type="password" placeholder="sk-or-...">
  <label for="setModel">モデル</label>
  <select id="setModel">
    <option value="inception/mercury-2">inception/mercury-2 (推奨・高速)</option>
    <option value="openai/gpt-oss-120b">openai/gpt-oss-120b</option>
    <option value="google/gemma-4-31b-it">google/gemma-4-31b-it</option>
    <option value="openai/gpt-oss-120b:free">openai/gpt-oss-120b:free (無料)</option>
    <option value="nvidia/nemotron-3-ultra-550b-a55b:free">nvidia/nemotron-3-ultra-550b-a55b:free (無料)</option>
    <option value="google/gemma-4-31b-it:free">google/gemma-4-31b-it:free (無料)</option>
  </select>
  <label for="setProvider">プロバイダ (任意・カンマ区切り)</label>
  <input id="setProvider" type="text" placeholder="cerebras">
  <div class="row">
    <button id="setSave">保存</button>
    <button id="setClear">キーを削除</button>
  </div>
  <div class="hint">キーは<b>この端末のブラウザ内(localStorage)のみ</b>に保存され、要約はあなたのブラウザから直接OpenRouterへ送られます。本文は書き換えません。<br><b>無料モデルでもAPIキーは必要</b>です(レート制限あり。長い会議だと一部失敗することがあります)。<a href="https://openrouter.ai/keys" target="_blank" rel="noopener">キーの取得</a></div>
</div>
<div id="transcript"><div id="message">会議を選択してください</div></div>
<div id="summary" hidden></div>
<footer>
  字幕は<a href="https://www.webtv.sangiin.go.jp/webtv/" target="_blank" rel="noopener">参議院インターネット審議中継</a>の音声自動認識によるもので誤変換を含みます。正式な記録は会議録を参照。字幕付き映像・字幕の転載は禁止されています(本ページは個人用ビューアです)
</footer>
<script>
const $ = (id) => document.getElementById(id);
const statusEl = $("status");
// セグメント取得の並列数。CDNはHTTP/2多重化なので高並列が効く(分析: 985件を32並列だと
// 並列効率31.6/32で飽和し、wall≈件数×RTT/並列。並列を上げると素直に縮む)。?conc=N で上書き可
const SEG_CONCURRENCY = (() => {
  const c = parseInt(new URLSearchParams(location.search).get("conc"), 10);
  return Number.isInteger(c) && c > 0 ? c : 96;
})();
const LIVE_POLL_MS = 15_000;

// ?debug=1 でボトルネック分析ログを出す
const DEBUG = new URLSearchParams(location.search).has("debug");
const dlog = (...a) => { if (DEBUG) console.log("%c[shusantv]", "color:#5fe0b7", ...a); };
const pctl = (arr, p) => { if (!arr.length) return 0; const s = arr.slice().sort((a, b) => a - b); return Math.round(s[Math.min(s.length - 1, Math.floor(s.length * p))]); };

async function fetchOk(url, opts) {
  // CDN がたまに落とすのでリトライ1回
  for (let i = 0; ; i++) {
    try {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error(`${res.status} ${url}`);
      return res;
    } catch (e) {
      if (i >= 1) throw e;
      await new Promise((r) => setTimeout(r, 800));
    }
  }
}

// 取得済み字幕セグメントを永続キャッシュ(Cache Storage)。HLSセグメントはURL不変・内容不変なので
// 再オープン時はネットワーク無しで返せる(VODは全ヒット、ライブは新規分のみ取得)。
const SEG_CACHE = "shusantv-vtt-v1";
async function fetchSegmentText(url, stats) {
  let cache;
  if (typeof caches !== "undefined") {
    try {
      cache = await caches.open(SEG_CACHE);
      const hit = await cache.match(url);
      if (hit) { if (stats) stats.hit++; return hit.text(); }
    } catch { /* キャッシュ不可ならネットワークにフォールバック */ }
  }
  if (stats) stats.miss++;
  const text = await (await fetchOk(url)).text(); // 失敗時は呼び出し側(pull)の.catchに委ねる(二重fetchしない)
  if (cache) cache.put(url, new Response(text, { headers: { "Content-Type": "text/vtt" } })).catch(() => {});
  return text;
}

// ---- m3u8 / VTT パース ----
function subtitleUri(master, baseUrl) {
  const m = master.match(/#EXT-X-MEDIA:TYPE=SUBTITLES[^\n]*URI="([^"]+)"/);
  return m ? new URL(m[1], baseUrl).href : null;
}
function segmentUrls(playlist, baseUrl) {
  return playlist.split(/\r?\n/).map((l) => l.trim())
    .filter((l) => l && !l.startsWith("#"))
    .map((l) => new URL(l, baseUrl).href);
}
function parseVtt(text) {
  const cues = [];
  const lines = text.split(/\r?\n/);
  for (let i = 0; i < lines.length; i++) {
    // WebVTT は1時間未満だと時間部を省略できる(MM:SS.mmm)
    const m = lines[i].match(/^(?:(\d{2,}):)?(\d{2}):(\d{2})\.(\d{3}) --> (?:(\d{2,}):)?(\d{2}):(\d{2})\.(\d{3})/);
    if (!m) continue;
    const sec = (h, mi, s, ms) => (h ? +h * 3600 : 0) + +mi * 60 + +s + +ms / 1000;
    let body = "";
    while (++i < lines.length && lines[i].trim() !== "") body += (body ? "\n" : "") + lines[i].trim();
    if (body) cues.push({ t: sec(m[1], m[2], m[3], m[4]), end: sec(m[5], m[6], m[7], m[8]), text: body });
  }
  return cues;
}
const fmtRel = (t) => {
  const h = Math.floor(t / 3600), m = Math.floor(t / 60) % 60, s = Math.floor(t) % 60;
  return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
};
const fmtJst = new Intl.DateTimeFormat("ja-JP", { timeZone: "Asia/Tokyo", hour: "2-digit", minute: "2-digit", second: "2-digit" });

// ---- セッション ----
// 会議切り替えで前のセッション(ポーリング・取得中フェッチ)を無効化する
let session = null;

class TranscriptSession {
  constructor(entry) {
    this.entry = entry;       // { name, m3u8?, hash?, channelInfo?, live }
    this.alive = true;
    this.cues = [];           // 時刻順
    this.keys = new Set();    // 重複排除: "start|text"
    this.lastEnd = null;      // 描画済み最終 cue の終了秒(休憩区切り用)
    this.fetchedUrls = new Set(); // 取得成功したセグメントURL。失敗分は次回ポーリングで再試行される
    this.subsUrl = null;
    this.startEpoch = null;   // 配信開始の実時刻(ms)。ライブのみ
    this.pollTimer = null;
  }
  stop() { this.alive = false; clearTimeout(this.pollTimer); }

  async resolveSubsUrl() {
    let masterUrl = this.entry.m3u8;
    if (!masterUrl) { // VOD: mediasp プレーヤーJSから m3u8 を取り出す
      const js = await (await fetchOk(`https://public.mediasp.jp/v1/player?hash=${this.entry.hash}`)).text();
      const m = js.match(/url:"(https:[^"]+\.m3u8)"/);
      if (!m) throw new Error("VODの動画URLを解決できませんでした");
      masterUrl = m[1];
    }
    const master = await (await fetchOk(masterUrl)).text();
    this.subsUrl = subtitleUri(master, masterUrl);
    if (!this.subsUrl) throw new Error("字幕トラックがありません(字幕は2024年8月以降の中継のみ)");
  }

  async loadChannelInfo() {
    if (!this.entry.channelInfo) return;
    try {
      const info = await (await fetchOk(this.entry.channelInfo)).json();
      const start = info?.status?.program_start;
      if (start) this.startEpoch = new Date(start).getTime();
    } catch { /* 実時刻表示なしで続行 */ }
  }

  fmtTime(t) {
    return this.startEpoch ? fmtJst.format(new Date(this.startEpoch + t * 1000)) : fmtRel(t);
  }

  // プレイリストを読み、未取得セグメントの字幕を取り込む。戻り値: 配信終了済みか
  async pull(onProgress) {
    const tPlaylist = performance.now();
    const playlist = await (await fetchOk(this.subsUrl, { cache: "no-store" })).text();
    const playlistMs = performance.now() - tPlaylist;
    const segs = segmentUrls(playlist, this.subsUrl);
    const todo = segs.filter((url) => !this.fetchedUrls.has(url));
    dlog(`pull: プレイリスト取得 ${Math.round(playlistMs)}ms / 全${segs.length}セグメント中 未取得${todo.length}`);
    if (todo.length) {
      const texts = new Array(todo.length);
      const durs = new Array(todo.length); // 各セグメントの取得所要(ms)
      const cstats = { hit: 0, miss: 0 };
      let next = 0, done = 0;
      const conc = Math.min(SEG_CONCURRENCY, todo.length);
      const tFetch = performance.now();
      await Promise.all(Array.from({ length: conc }, async () => {
        while (next < todo.length && this.alive) {
          const i = next++;
          const ts = performance.now();
          texts[i] = await fetchSegmentText(todo[i], cstats).catch(() => null);
          durs[i] = performance.now() - ts;
          onProgress?.(++done, todo.length);
        }
      }));
      if (!this.alive) return true;
      if (DEBUG) {
        const ok = durs.filter((_, i) => texts[i] != null);
        const fails = texts.filter((t) => t == null).length;
        const wall = performance.now() - tFetch;
        const sum = durs.reduce((a, b) => a + (b || 0), 0);
        const bytes = texts.reduce((a, t) => a + (t ? t.length : 0), 0);
        dlog(
          `pull: セグメント取得 wall=${Math.round(wall)}ms (並列${conc})\n` +
          `  件数=${todo.length} 失敗=${fails} キャッシュ hit=${cstats.hit}/miss=${cstats.miss} 合計DL=${(bytes / 1024).toFixed(0)}KB\n` +
          `  1件あたり ms: 平均${Math.round(sum / (ok.length || 1))} / p50=${pctl(ok, .5)} / p95=${pctl(ok, .95)} / 最大=${Math.round(Math.max(0, ...ok))}\n` +
          `  並列効率=${(sum / wall).toFixed(1)}x (理論上限${conc}x。低いほど直列化/律速されている)\n` +
          `  スループット=${(todo.length / (wall / 1000)).toFixed(1)} 件/秒`
        );
      }
      const tParse = performance.now();
      const fresh = [];
      for (let i = 0; i < todo.length; i++) {
        const text = texts[i];
        if (text === null) continue; // 失敗分は fetchedUrls に入れず、次のポーリングで再試行
        this.fetchedUrls.add(todo[i]);
        for (const cue of parseVtt(text)) {
          const key = `${cue.t.toFixed(3)}|${cue.text}`;
          if (this.keys.has(key)) continue;
          this.keys.add(key);
          fresh.push(cue);
        }
      }
      fresh.sort((a, b) => a.t - b.t);
      // 同じ字幕がセグメントを跨いで開始時刻ズレで再掲されるため、近接する同文 cue は1つに統合する
      const isAppendOnly =
        !fresh.length || !this.cues.length || fresh[0].t >= this.cues[this.cues.length - 1].t;
      if (isAppendOnly) {
        const merged = [];
        for (const cue of fresh) {
          const last = merged[merged.length - 1] ?? this.cues[this.cues.length - 1];
          if (last && last.text === cue.text && cue.t - last.end <= 6) {
            last.end = Math.max(last.end, cue.end);
            if (this.lastEnd != null) this.lastEnd = Math.max(this.lastEnd, last.end);
            continue;
          }
          merged.push(cue);
        }
        this.cues.push(...merged);
        appendCues(this, merged);
      } else {
        // 再試行で過去のセグメントが後から届いた場合: 全体を時刻順に統合し直して再描画
        const all = [...this.cues, ...fresh].sort((a, b) => a.t - b.t);
        this.cues = [];
        for (const cue of all) {
          const last = this.cues[this.cues.length - 1];
          if (last && last.text === cue.text && cue.t - last.end <= 6) {
            last.end = Math.max(last.end, cue.end);
            continue;
          }
          this.cues.push(cue);
        }
        transcriptEl.innerHTML = "";
        this.lastEnd = null;
        appendCues(this, this.cues);
      }
      dlog(`pull: パース+描画 ${Math.round(performance.now() - tParse)}ms / 新規cue ${fresh.length} (累計${this.cues.length})`);
    }
    return playlist.includes("#EXT-X-ENDLIST");
  }
}

// ---- 描画 ----
const transcriptEl = $("transcript");
function showMessage(text, isError) {
  transcriptEl.innerHTML = "";
  const d = document.createElement("div");
  d.id = "message";
  if (isError) d.className = "error";
  d.textContent = text;
  transcriptEl.appendChild(d);
}
function appendCues(sess, cues) {
  if (!cues.length) return;
  $("message")?.remove();
  const frag = document.createDocumentFragment();
  const query = $("filter").value.trim();
  for (const cue of cues) {
    if (sess.lastEnd != null && cue.t - sess.lastEnd > 600) { // 10分以上の無音(休憩)は区切りを入れる
      const gap = document.createElement("div");
      gap.className = "gap";
      gap.textContent = `─ 休憩 (${fmtRel(cue.t - sess.lastEnd)}) ─`;
      frag.appendChild(gap);
    }
    sess.lastEnd = cue.end;
    const row = document.createElement("div");
    row.className = "cue";
    const t = document.createElement("span");
    t.className = "t";
    t.textContent = sess.fmtTime(cue.t);
    t.title = `開始から ${fmtRel(cue.t)}`;
    const txt = document.createElement("span");
    txt.className = "txt";
    txt.textContent = cue.text;
    row.append(t, txt);
    if (query) applyFilterToRow(row, query);
    frag.appendChild(row);
  }
  transcriptEl.appendChild(frag);
  if ($("follow").checked && sess.entry.live) window.scrollTo(0, document.body.scrollHeight);
}

// ---- 絞り込み ----
function applyFilterToRow(row, query) {
  const txt = row.querySelector(".txt");
  const hit = !query || txt.textContent.includes(query);
  row.classList.toggle("hidden", !hit);
  if (hit && query) {
    txt.innerHTML = "";
    for (const part of txt.textContent.split(query).flatMap((p, i) => (i ? [query, p] : [p]))) {
      if (part === query) { const m = document.createElement("mark"); m.textContent = part; txt.appendChild(m); }
      else txt.appendChild(document.createTextNode(part));
    }
  } else if (txt.querySelector("mark")) {
    txt.textContent = txt.textContent; // mark を除去
  }
}
let filterTimer = null; // 数千行を毎キー走査しないよう debounce
$("filter").addEventListener("input", () => {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => {
    const query = $("filter").value.trim();
    for (const row of transcriptEl.querySelectorAll(".cue")) applyFilterToRow(row, query);
  }, 200);
});

// ---- ダウンロード ----
function download(name, mime, body) {
  const a = document.createElement("a");
  const url = URL.createObjectURL(new Blob([body], { type: mime }));
  a.href = url;
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000); // 即時解放するとダウンロード開始前にURLが無効になるブラウザがある
}
const today = () => new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Tokyo" });
// 取得失敗→再試行で cue が後追い追加されることがあるため、書き出し時は時刻順に揃える
const sortedCues = () => [...session.cues].sort((a, b) => a.t - b.t);
$("dlTxt").onclick = () => {
  if (!session) return;
  const body = sortedCues().map((c) => `${session.fmtTime(c.t)}\t${c.text.replace(/\n/g, " ")}`).join("\n");
  download(`${today()}_${session.entry.name}.txt`, "text/plain;charset=utf-8", body);
};
$("dlVtt").onclick = () => {
  if (!session) return;
  const ts = (t) => `${String(Math.floor(t / 3600)).padStart(2, "0")}:${String(Math.floor(t / 60) % 60).padStart(2, "0")}:${(t % 60).toFixed(3).padStart(6, "0")}`;
  const body = "WEBVTT\n\n" + sortedCues().map((c) => `${ts(c.t)} --> ${ts(c.end)}\n${c.text}`).join("\n\n") + "\n";
  download(`${today()}_${session.entry.name}.vtt`, "text/vtt;charset=utf-8", body);
};

// ---- AI要約 (BYOK / OpenRouter) ----
// キーはユーザー端末のlocalStorageのみ。要約はブラウザから直接OpenRouterへ。本文は書き換えない。
const CFG_KEY = "shusantv.aicfg";
const SUMMARY_CHUNK = 180;  // 1チャンクのcue数
const SUMMARY_CONC = 6;     // 並列数(429回避のため控えめ)
const REASONING = "medium"; // qaの網羅にはmedium

const SUM_SYSTEM = `あなたは国会審議の自動字幕(誤変換あり)を、2階層で要約するアシスタントです。
本文は書き換えません。次の2階層に分けて要約し、JSONだけを返します(コードブロック不要):
{ "qa": [{"i": <質疑開始index>, "kind": "<質疑|手続き>", "questioner": "<質問者名/null>", "gist": "<30字以内の見出し>", "points": ["<質疑全体の要旨。1〜3個の箇条書き。各40字以内>"]}],
  "turns": [{"i": <発言開始index>, "sp": "<発言者>", "gist": "<25字以内>", "summary": "<2〜4文>"}] }
- qa: 1人の質問者(委員長に「○○くん」と指名される議員)が始めてから次の質問者に交代するまで(答弁者交代は内包)。開会等はkind="手続き"・questioner=null。
- qa.points: その質疑全体の要点を1〜3個の箇条書きで。多くても3個まで。冗長にしない。
- turns: qa内の発言者交代ごと。同一発言者の連続は1つに。
- gistは簡潔、要旨・要約は中立。原文の逐語転記はしない。
- 【重要】iは入力行頭の[ ]内の番号をそのまま使う。1から振り直さない。
- 【重要】gist・points・summary・spは必ず日本語で書く。英語にしない。`;

const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

function cfg() {
  let c = {};
  try { c = JSON.parse(localStorage.getItem(CFG_KEY) || "{}"); } catch { /* 破損は無視 */ }
  return { key: c.key || "", model: c.model || "inception/mercury-2", provider: c.provider || "" };
}
function refreshAiBtn() { $("aiBtn").disabled = !(cfg().key && session && session.cues.length); }

$("gear").onclick = () => {
  const c = cfg();
  $("setKey").value = c.key; $("setModel").value = c.model; $("setProvider").value = c.provider;
  $("settings").classList.toggle("open");
};
$("setSave").onclick = () => {
  localStorage.setItem(CFG_KEY, JSON.stringify({
    key: $("setKey").value.trim(), model: $("setModel").value, provider: $("setProvider").value.trim(),
  }));
  $("settings").classList.remove("open");
  refreshAiBtn();
};
$("setClear").onclick = () => {
  const c = cfg(); localStorage.setItem(CFG_KEY, JSON.stringify({ ...c, key: "" }));
  $("setKey").value = ""; refreshAiBtn();
};

async function callChunk(cues, start, end, c) {
  const body = cues.slice(start, end).map((cu, j) => `[${start + j}] ${cu.text}`).join("\n");
  const payload = {
    model: c.model,
    messages: [{ role: "system", content: SUM_SYSTEM }, { role: "user", content: body }],
    temperature: 0.2,
    usage: { include: true }, // レスポンスに課金額(usage.cost)を含める
  };
  // 無料モデル(:free)は専用エンドポイントに任せるためプロバイダ指定しない
  if (c.provider && !c.model.endsWith(":free")) {
    const order = c.provider.split(",").map((s) => s.trim()).filter(Boolean);
    if (order.length) payload.provider = { order, allow_fallbacks: true };
  }
  if (c.model.includes("gpt-oss")) payload.reasoning = { effort: REASONING };
  const res = await fetchOk("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: { Authorization: `Bearer ${c.key}`, "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const j = await res.json();
  const cost = j.usage?.cost ?? 0;
  const text = j.choices?.[0]?.message?.content ?? "";
  const s = text.indexOf("{"), e = text.lastIndexOf("}");
  if (s < 0 || e < 0) return { qa: [], turns: [], cost };
  try {
    const p = JSON.parse(text.slice(s, e + 1));
    // LLMが i を文字列で返すことがあるので整数化し、無効なものは除外
    const norm = (arr) => (Array.isArray(arr) ? arr : []).map((o) => ({ ...o, i: parseInt(o.i, 10) })).filter((o) => Number.isInteger(o.i));
    return { qa: norm(p.qa), turns: norm(p.turns), cost };
  } catch { return { qa: [], turns: [], cost }; }
}

// チャンク結果を統合: turn重複除去 + 境界で分断された同一質問者の質疑を結合
function stitch(parts) {
  const qa = [], turns = [];
  for (const p of parts) { qa.push(...p.qa); turns.push(...p.turns); }
  qa.sort((a, b) => a.i - b.i); turns.sort((a, b) => a.i - b.i);
  const seen = new Set(), tdedup = [];
  for (const t of turns) { if (seen.has(t.i)) continue; seen.add(t.i); tdedup.push(t); }
  const qm = [];
  for (const q of qa) {
    const last = qm[qm.length - 1];
    if (last && q.kind === "質疑" && last.kind === "質疑" && q.questioner && q.questioner === last.questioner) continue;
    qm.push(q);
  }
  return { qa: qm, turns: tdedup };
}

async function summarize() {
  const sess = session;
  const c = cfg();
  if (!c.key) { $("settings").classList.add("open"); return; }
  if (!sess || !sess.cues.length) return;
  const cues = [...sess.cues].sort((a, b) => a.t - b.t);
  const cacheKey = `shusantv.sum.${sess.entry.id}.${cues.length}.${c.model}`;
  let data = null;
  try { const hit = localStorage.getItem(cacheKey); if (hit) { data = JSON.parse(hit); data.fromCache = true; } } catch { /* 無視 */ }
  if (!data) {
    $("aiBtn").disabled = true;
    const ranges = [];
    for (let i = 0; i < cues.length; i += SUMMARY_CHUNK) ranges.push([i, Math.min(i + SUMMARY_CHUNK, cues.length)]);
    const parts = new Array(ranges.length);
    let next = 0, done = 0, failed = 0;
    const conc = c.model.endsWith(":free") ? 2 : SUMMARY_CONC; // 無料枠はレート制限が厳しいので絞る
    statusEl.textContent = `要約中 0/${ranges.length}`;
    await Promise.all(Array.from({ length: Math.min(conc, ranges.length) }, async () => {
      while (next < ranges.length) {
        const k = next++;
        try { parts[k] = await callChunk(cues, ranges[k][0], ranges[k][1], c); }
        catch { parts[k] = { qa: [], turns: [], cost: 0 }; failed++; }
        if (sess !== session) return;
        statusEl.textContent = `要約中 ${++done}/${ranges.length}`;
      }
    }));
    if (sess !== session) return; // 会議が切り替わっていたら破棄
    data = stitch(parts.filter(Boolean));
    data.cost = parts.reduce((a, p) => a + (p && p.cost || 0), 0);
    data.model = c.model;
    data.failed = failed;
    statusEl.textContent = failed ? `要約完了 (一部失敗 ${failed})` : "要約完了";
    try { localStorage.setItem(cacheKey, JSON.stringify(data)); } catch { /* 容量超過は無視 */ }
  }
  renderSummary(sess, cues, data);
  refreshAiBtn();
}

// 課金額の表示用フォーマット(USD + 概算円)。円レートは概算
const JPY_PER_USD = 155;
function fmtCost(usd) {
  if (!usd) return "$0";
  const yen = usd * JPY_PER_USD;
  return `$${usd < 0.01 ? usd.toFixed(5) : usd.toFixed(4)}（約${yen < 1 ? yen.toFixed(1) : Math.round(yen)}円）`;
}

// summaryを文ごとの箇条書きに分割(。や改行区切り)
function toBullets(text) {
  return String(text || "").split(/[。\n]+/).map((s) => s.trim()).filter(Boolean);
}

function renderSummary(sess, cues, data) {
  const root = $("summary");
  root.innerHTML = "";
  const { qa, turns } = data;
  if (!qa.length && !turns.length) { root.innerHTML = '<div id="message">要約を生成できませんでした</div>'; showView("summary"); return; }
  // 課金額・モデルのバー
  const bar = document.createElement("div"); bar.className = "sumbar";
  const costStr = data.fromCache ? "キャッシュ表示（今回の課金なし）" : `コスト ${fmtCost(data.cost || 0)}`;
  bar.textContent = `🧾 ${costStr} ・ ${data.model || ""}${data.failed ? ` ・ 一部失敗 ${data.failed}` : ""}`;
  root.appendChild(bar);
  const count = document.createElement("div"); count.className = "qa-count"; count.textContent = `質疑応答（${qa.length}件）`;
  root.appendChild(count);
  const inRange = (lo, hi) => turns.filter((t) => t.i >= lo && t.i < hi);
  // 指定 cue 範囲の原文(時刻+本文)を組み立てる。展開トグルで使い回す
  const buildRawBody = (lo, hi) => {
    const rb = document.createElement("div"); rb.className = "raw-body"; rb.hidden = true;
    for (let i = Math.max(0, lo); i < Math.min(cues.length, hi); i++) {
      const cu = cues[i];
      const rl = document.createElement("div"); rl.className = "rl";
      const rt = document.createElement("span"); rt.className = "rt"; rt.textContent = sess.fmtTime(cu.t);
      const rx = document.createElement("span"); rx.className = "rx"; rx.textContent = cu.text;
      rl.append(rt, rx); rb.appendChild(rl);
    }
    return rb;
  };
  // クリックで raw-body を開閉(trigger に open クラスを付与してキャレットを切替)
  const wireToggle = (trigger, rb) => {
    trigger.classList.add("expandable");
    trigger.addEventListener("click", () => {
      rb.hidden = !rb.hidden;
      trigger.classList.toggle("open", !rb.hidden);
    });
  };

  qa.forEach((q, k) => {
    const lo = k === 0 ? 0 : q.i, hi = k + 1 < qa.length ? qa[k + 1].i : cues.length;
    const card = document.createElement("section"); card.className = "qa-card";
    // ヘッダ: トピック名 + 開始時刻
    const head = document.createElement("div"); head.className = "qa-card-head";
    const title = document.createElement("span"); title.className = "qa-title";
    title.textContent = q.gist || (q.kind === "手続き" ? "議事手続き" : (q.questioner ? `${q.questioner}の質疑` : "質疑"));
    const time = document.createElement("span"); time.className = "qa-time";
    if (cues[lo]) time.textContent = `▶ ${sess.fmtTime(cues[lo].t)}〜`;
    head.append(title, time); card.appendChild(head);

    // 各発言を 質問/答弁/進行 の行として描画。ラベルをクリックするとその発言の原文を展開する
    // 原文範囲は隣接する発言の開始indexで決まる。先頭発言より前のcueは先頭発言に含める
    const turnsHere = inRange(lo, hi);
    turnsHere.forEach((t, ti) => {
      const tLo = ti === 0 ? lo : t.i;
      const tHi = ti + 1 < turnsHere.length ? turnsHere[ti + 1].i : hi;
      const role = turnRole(t.sp, q.questioner); // 質問/答弁/""
      const kind = role === "質問" ? "q" : role === "答弁" ? "a" : "n";
      const row = document.createElement("div"); row.className = `qa-row qa-row--${kind}`;
      const lab = document.createElement("div"); lab.className = "qa-label"; lab.textContent = role || "進行";
      const content = document.createElement("div"); content.className = "qa-content";
      const sp = document.createElement("div"); sp.className = "qa-speaker";
      const note = role === "質問" ? "質疑者" : role === "答弁" ? "答弁者" : "";
      sp.innerHTML = `<b>${esc(t.sp || "")}</b>${note ? `<span class="note">（${note}）</span>` : ""}`;
      content.appendChild(sp);
      const bullets = toBullets(t.summary || t.gist);
      if (bullets.length > 1) {
        const ul = document.createElement("ul"); ul.className = "qa-bullets";
        for (const b of bullets) { const li = document.createElement("li"); li.textContent = b; ul.appendChild(li); }
        content.appendChild(ul);
      } else {
        const p = document.createElement("div"); p.className = "qa-text"; p.textContent = t.summary || t.gist || ""; content.appendChild(p);
      }
      if (tHi > tLo) { // 対応するcueがある時だけ展開可能にする
        const rb = buildRawBody(tLo, tHi);
        content.appendChild(rb);
        wireToggle(lab, rb);
      }
      row.append(lab, content); card.appendChild(row);
    });

    // 発言行が無い質疑(手続き等)は、ヘッダクリックでカード全体の原文を展開
    if (!turnsHere.length && hi > lo) {
      const rb = buildRawBody(lo, hi);
      card.appendChild(rb);
      wireToggle(head, rb);
    }

    root.appendChild(card);
  });
  showView("summary");
}

// 役割(質問/答弁)を発言者名と質問者名から推定(LLM出力を増やさずクライアント側で導出)
function turnRole(sp, questioner) {
  const norm = (s) => (s || "").replace(/\s|くん|君|さん|[（）()]/g, "");
  const x = norm(sp);
  if (!x || x.includes("委員長") || x.includes("会長")) return ""; // 進行(中立)
  // 同姓の閣僚答弁を質問と誤判定しないよう、役職パターンを先に判定
  if (/大臣|参考人|長官|次官|審議官|局長|部長|課長|政府|参与|総裁|公述人|政務官|総理/.test(x)) return "答弁";
  const q = norm(questioner);
  if (!q) return ""; // 質問者不明(手続き等)は中立
  // 質疑内では、質問者本人=質問・それ以外の発言者=答弁(役職名のない提出者等も答弁に)
  return (x.includes(q) || q.includes(x)) ? "質問" : "答弁";
}

function showView(which) {
  const sum = which === "summary";
  $("summary").hidden = !sum;
  $("transcript").hidden = sum;
  $("viewToggle").hidden = false;
  $("viewToggle").textContent = sum ? "原文" : "要約";
}
$("viewToggle").onclick = () => showView($("summary").hidden ? "summary" : "transcript");
$("aiBtn").onclick = summarize;

// ---- 会議の選択と読み込み ----
async function openMeeting(entry) {
  session?.stop();
  const sess = (session = new TranscriptSession(entry));
  showMessage("字幕トラックを解決中…");
  // ビューを原文に戻し、前会議の要約をクリア
  $("summary").innerHTML = ""; $("summary").hidden = true; $("transcript").hidden = false; $("viewToggle").hidden = true;
  $("dlTxt").disabled = $("dlVtt").disabled = true;
  $("aiBtn").disabled = true;
  try {
    const tOpen = performance.now();
    await Promise.all([sess.resolveSubsUrl(), sess.loadChannelInfo()]);
    if (!sess.alive) return;
    dlog(`open「${entry.name}」: 字幕トラック解決 ${Math.round(performance.now() - tOpen)}ms`);
    const progress = (done, total) => {
      if (sess.alive) statusEl.textContent = `字幕取得中 ${done}/${total}`;
    };
    let ended = await sess.pull(progress);
    if (!sess.alive) return;
    dlog(`open「${entry.name}」: 初回ロード完了 計${Math.round(performance.now() - tOpen)}ms (${sess.cues.length}発言)`);
    $("dlTxt").disabled = $("dlVtt").disabled = false;
    refreshAiBtn();
    if (!sess.cues.length) showMessage(ended ? "字幕がありません" : "まだ字幕がありません(発言が始まると表示されます)");
    if (entry.live && !ended) {
      statusEl.textContent = `${sess.cues.length} 発言 — 中継中(自動更新)`;
      // pull が15秒を超えても多重実行されないよう、完了してから次回を予約する
      const poll = async () => {
        if (!sess.alive) return;
        try {
          ended = await sess.pull();
          if (!sess.alive) return;
          statusEl.textContent = `${sess.cues.length} 発言 — ${ended ? "配信終了" : "中継中(自動更新)"}`;
          if (ended) return;
        } catch { /* 一時的な失敗は次回ポーリングに任せる */ }
        sess.pollTimer = setTimeout(poll, LIVE_POLL_MS);
      };
      sess.pollTimer = setTimeout(poll, LIVE_POLL_MS);
    } else {
      statusEl.textContent = `${sess.cues.length} 発言`;
    }
  } catch (e) {
    if (sess.alive) { showMessage(String(e.message || e), true); statusEl.textContent = ""; }
  }
}

async function init() {
  const select = $("meeting");
  let data;
  try {
    data = await (await fetchOk("streams.json")).json();
  } catch {
    showMessage("streams.json を取得できません(ローカルは server.js 経由で開いてください)", true);
    return;
  }
  const lives = (data.streams || []).filter((s) => s.house === "sangiin" && !s.pending);
  const vods = data.vod || [];
  const entries = new Map(); // id -> entry
  select.innerHTML = "";
  const add = (group, entry, label) => {
    entries.set(entry.id, entry);
    const opt = document.createElement("option");
    opt.value = entry.id;
    opt.textContent = label;
    group.appendChild(opt);
  };
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = `会議を選択 (${lives.length + vods.length}件)`;
  select.appendChild(placeholder);
  if (lives.length) {
    const g = document.createElement("optgroup");
    g.label = "中継中";
    for (const s of lives) add(g, { ...s, live: true }, `🔴 ${s.name} ${s.time ?? ""}`);
    select.appendChild(g);
  }
  if (vods.length) {
    const g = document.createElement("optgroup");
    g.label = "本日の録画";
    for (const v of vods) add(g, { ...v, live: false }, v.name);
    select.appendChild(g);
  }
  if (!entries.size) {
    placeholder.textContent = "本日の参議院の中継・録画はありません";
    showMessage("本日の参議院の中継・録画はありません(字幕があるのは参議院のみ)");
    return;
  }
  select.onchange = () => {
    const entry = entries.get(select.value);
    history.replaceState(null, "", select.value ? `?id=${select.value}` : location.pathname);
    if (entry) openMeeting(entry);
  };
  // ?id=sidNNNN での直リンク
  const wanted = new URLSearchParams(location.search).get("id");
  if (wanted && entries.has(wanted)) {
    select.value = wanted;
    openMeeting(entries.get(wanted));
  }
}
init();
</script>
